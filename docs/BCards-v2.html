<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BCards — Patrulha de Heróis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">

<style id="theme-layer">
:root {
  --ink:        #1a1a2e;
  --bg:         #d6eeff;       /* céu azul claro */
  --surface:    #ffffff;
  --raised:     #f0f8ff;
  --card-bg:    #ffffff;
  --gold:       #ffb800;
  --gold-lt:    #ffd640;
  --gold-dk:    #cc8800;
  --gold-glow:  rgba(255,184,0,.45);
  --silver:     #8a9bb5;
  --text:       #1a2a4a;
  --text-dim:   #5a7a9a;
  --p1-col:     #e63020;
  --p1-lt:      #ff4433;
  --p1-glow:    rgba(230,48,32,.5);
  --p2-col:     #1565c0;
  --p2-lt:      #2196f3;
  --p2-glow:    rgba(21,101,192,.5);
  /* cores por personagem — substituem elementos */
  --rex:        #e63020;  --rex-glow:     rgba(230,48,32,.5);
  --marina:     #2196f3;  --marina-glow:  rgba(33,150,243,.5);
  --guto:       #ffb800;  --guto-glow:    rgba(255,184,0,.5);
  --asa:        #ff7b00;  --asa-glow:     rgba(255,123,0,.5);
  --faisca:     #22bb44;  --faisca-glow:  rgba(34,187,68,.5);
  --hp-hi:   #22bb44;
  --hp-mid:  #ffb800;
  --hp-lo:   #e63020;
  --hp-empty: rgba(26,42,78,.12);
  --r:        14px;
  --r-sm:     8px;
  --pace-speed: 1;

  /* Zone expand system */
  --zone-scale-dur:        420ms;
  --zone-scale-ease:       cubic-bezier(.4, 0, .2, 1);
  --zone-inactive-opacity: 0.6;

  /* Card sizes — active zone ~35% bigger, inactive ~30% smaller */
  --card-active-w:   clamp(88px,  17vw, 140px);
  --card-active-h:   clamp(124px, 23.5vw, 195px);
  --card-inactive-w: clamp(50px,  8.5vw, 74px);
  --card-inactive-h: clamp(70px,  12vw,  103px);
}
</style>

<style id="layout-layer">
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; overflow:hidden; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}

body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 40% at 20% 30%, rgba(255,255,255,.55) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 75% 20%, rgba(255,255,255,.45) 0%, transparent 55%),
    radial-gradient(ellipse 90% 50% at 50% 100%, rgba(100,180,255,.15) 0%, transparent 60%);
}

/* ── Main layout removed FAB dock CSS ── */
#gpc-inline {
  display:none;
}

/* ── Main layout ── */
#main {
  flex:1; display:flex; flex-direction:column;
  overflow:visible; /* v15: allow scaled zones to bleed without clipping */
  position:relative; z-index:1; height:100dvh;
}

/* Round counter */
#round-counter {
  position: fixed;
  top: 8px; left: 50%; transform: translateX(-50%);
  z-index: 20;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: clamp(7px, 1.1vw, 9px);
  color: var(--text);
  letter-spacing: 2px;
  background: rgba(255,255,255,.85);
  border: 2px solid var(--gold);
  border-radius: 20px;
  padding: 2px 12px;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
}

/* ── FIELD ZONES — P2 top, P1 bottom ── */
.player-zone {
  flex: 1 1 50%;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: visible;
  padding: clamp(6px,1.2vw,12px) clamp(6px,1.5vw,14px);
  gap: clamp(4px,.8vw,8px);
}

#zone-p2 {
  background: radial-gradient(ellipse 110% 140% at 50% -10%, rgba(21,101,192,.12) 0%, rgba(21,101,192,.04) 45%, transparent 70%);
  transform: rotate(180deg);
}
#zone-p1 {
  background: radial-gradient(ellipse 110% 140% at 50% 110%, rgba(230,48,32,.12) 0%, rgba(230,48,32,.04) 45%, transparent 70%);
}

#zone-p2.zone-turn-active {
  background: radial-gradient(ellipse 110% 140% at 50% -10%, rgba(21,101,192,.22) 0%, rgba(21,101,192,.08) 45%, transparent 70%);
}
#zone-p1.zone-turn-active {
  background: radial-gradient(ellipse 110% 140% at 50% 110%, rgba(230,48,32,.22) 0%, rgba(230,48,32,.08) 45%, transparent 70%);
}

/* Inner wrapper inside flipped P2 zone — re-flip content so text is readable */
#zone-p2 .zone-inner {
  transform: rotate(180deg);
  display: flex; flex-direction: column; align-items: center;
  gap: clamp(4px,.8vw,8px); width: 100%;
}
#zone-p1 .zone-inner {
  display: flex; flex-direction: column; align-items: center;
  gap: clamp(4px,.8vw,8px); width: 100%;
}

/* ── Divider ── */
#field-divider {
  flex: 0 0 auto;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(21,101,192,.2) 30%, rgba(21,101,192,.5) 50%, rgba(21,101,192,.2) 70%, transparent);
  position: relative;
  z-index: 5;
  margin: 0 clamp(20px,5vw,80px);
}

/* ── Player label ── */
.zone-label {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: clamp(7px,1.1vw,10px);
  letter-spacing: 1px;
  opacity: .7;
}
.zone-label.p1 { color:var(--p1-lt); }
.zone-label.p2 { color:var(--p2-lt); }

/* Turn badge */
.turn-badge {
  display:none; font-family:'Nunito',sans-serif; font-weight:900; font-size:clamp(7px,1vw,9px);
  color:#fff; background:var(--gold);
  border:none; border-radius:20px; padding:2px 10px;
  letter-spacing:1px; animation:badgePulse 1.2s ease-in-out infinite;
  box-shadow: 0 2px 6px rgba(0,0,0,.18);
}
.turn-badge.show { display:block; }
@keyframes badgePulse { 0%,100%{opacity:.8; transform:scale(1)} 50%{opacity:1; transform:scale(1.04)} }

/* HP bar row */
.player-hp-bar-wrap {
  width: clamp(160px, 55%, 360px);
  display:flex; align-items:center; gap:6px;
  flex-shrink:0;
}
.php-label { font-family:'Nunito',sans-serif; font-weight:800; font-size:clamp(6px,.9vw,8px); letter-spacing:.5px; white-space:nowrap; flex-shrink:0; }
.p1-clr { color:var(--p1-lt); }
.p2-clr { color:var(--p2-lt); }
.php-num   { font-family:'Nunito',sans-serif; font-weight:900; font-size:clamp(7px,1vw,9px); white-space:nowrap; flex-shrink:0; }
.php-bar {
  flex: 1; height: 9px; border-radius: 6px;
  background: rgba(26,42,78,.12);
  box-shadow: inset 0 1px 3px rgba(0,0,0,.15);
  overflow: visible; position: relative; isolation: isolate;
}
.php-fill {
  height: 100%; border-radius: 6px; position: relative;
  transition: width .7s cubic-bezier(.4,0,.2,1), background .5s;
  overflow: hidden;
}
.php-fill::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.28) 40%, rgba(255,255,255,.55) 50%, rgba(255,255,255,.28) 60%, transparent 100%);
  background-size: 200% 100%;
  animation: energyShimmer 1.8s ease-in-out infinite;
  border-radius: inherit;
}
@keyframes energyShimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
#p1-php-fill {
  background: linear-gradient(90deg, #6a0000 0%, #c0392b 45%, #ff6050 85%, #ffaa80 100%);
  box-shadow: 0 0 8px rgba(220,60,40,.8), 0 0 18px rgba(220,60,40,.4), inset 0 1px 0 rgba(255,180,160,.35);
}
#p2-php-fill {
  background: linear-gradient(90deg, #001a5a 0%, #1565c0 45%, #2196f3 85%, #80d0ff 100%);
  box-shadow: 0 0 8px rgba(30,100,220,.8), 0 0 18px rgba(30,100,220,.4), inset 0 1px 0 rgba(150,210,255,.35);
}

/* ── Cards grid ── */
.cards-grid {
  display:flex; flex-wrap:wrap;
  gap: clamp(5px,1vw,10px);
  align-items:center; justify-content:center;
  position: relative;
}

/* ── Deck flip container — wraps all cards ── */
.deck-wrap {
  position: relative;
  display: flex;
  flex-wrap: wrap;
  gap: clamp(5px,1vw,10px);
  align-items: center;
  justify-content: center;
  perspective: 800px;
  /* transition and transform controlled by the DECK TURN-AWAY SYSTEM below */
}


/* ── ELEMENT TOKENS ── */
.rex     { --elem-color:var(--rex);    --elem-glow:var(--rex-glow);    --card-bg-a:#fff2f0; --card-bg-b:#fff8f7; --shine-clr:rgba(230,48,32,.15);  --mid-clr:rgba(230,48,32,.06);  --stripe-a:#e63020; --stripe-b:#ff6650; }
.marina  { --elem-color:var(--marina); --elem-glow:var(--marina-glow); --card-bg-a:#f0f7ff; --card-bg-b:#f7fbff; --shine-clr:rgba(33,150,243,.15);  --mid-clr:rgba(33,150,243,.06); --stripe-a:#1565c0; --stripe-b:#2196f3; }
.guto    { --elem-color:var(--guto);   --elem-glow:var(--guto-glow);   --card-bg-a:#fffbf0; --card-bg-b:#fffdf7; --shine-clr:rgba(255,184,0,.18);   --mid-clr:rgba(255,184,0,.07);  --stripe-a:#cc8800; --stripe-b:#ffb800; }
.asa     { --elem-color:var(--asa);    --elem-glow:var(--asa-glow);    --card-bg-a:#fff5ee; --card-bg-b:#fff9f5; --shine-clr:rgba(255,123,0,.15);   --mid-clr:rgba(255,123,0,.06);  --stripe-a:#cc5500; --stripe-b:#ff7b00; }
.faisca  { --elem-color:var(--faisca); --elem-glow:var(--faisca-glow); --card-bg-a:#f0fff3; --card-bg-b:#f7fff9; --shine-clr:rgba(34,187,68,.15);   --mid-clr:rgba(34,187,68,.06);  --stripe-a:#178a30; --stripe-b:#22bb44; }

/* ── Card base ── */
/* v19: zero 3D flip on card element — no preserve-3d, no backface-visibility.
   Face state is purely opacity on .card-inner vs .card-back via data-face attr. */
.card {
  width: var(--card-active-w, clamp(88px,17vw,140px));
  height: var(--card-active-h, clamp(124px,23.5vw,195px));
  border-radius: var(--r);
  background: linear-gradient(155deg, var(--card-bg-a, #211d2c) 0%, var(--card-bg-b, #0d0b10) 100%);
  border: 2px solid rgba(26,42,78,.10);
  box-shadow: 0 4px 0 rgba(0,0,0,.15), 0 6px 18px rgba(0,0,0,.12);
  display: flex; flex-direction: column;
  padding: 0;
  cursor: pointer; user-select: none;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

/* Card back — hidden by default, shown when data-face="down" */
.card-back {
  position: absolute; inset: 0;
  border-radius: inherit;
  background: repeating-linear-gradient(
    45deg,
    rgba(21,101,192,.08) 0,
    rgba(21,101,192,.08) 5px,
    rgba(214,238,255,.9) 5px,
    rgba(214,238,255,.9) 10px
  );
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(22px,4vw,34px);
  border: 2px solid rgba(21,101,192,.25);
  opacity: 0;
  pointer-events: none;
  z-index: 10;
  transition: opacity var(--flip-dur) var(--flip-ease) calc(var(--flip-i,0) * var(--flip-stagger));
}
.card-back::before {
  content: '';
  position: absolute; inset: 8px;
  border: 1.5px solid rgba(21,101,192,.18);
  border-radius: calc(var(--r) - 4px);
}

/* ── face-down: show back, hide front ── */
.card[data-face="down"] .card-back  { opacity: 1; }
.card[data-face="down"] .card-inner { opacity: 0; }
.card[data-face="down"]::after      { opacity: 0; }
.card[data-face="down"] .card-glow  { opacity: 0 !important; }

.card::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: inherit; pointer-events: none;
  background:
    radial-gradient(ellipse 85% 50% at 50% 0%, var(--shine-clr, rgba(255,255,255,.08)) 0%, transparent 65%),
    radial-gradient(ellipse 55% 35% at 50% 60%, var(--mid-clr, rgba(255,255,255,.03)) 0%, transparent 70%);
  z-index: 0;
}
.card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  border-radius: var(--r) var(--r) 0 0;
  background: linear-gradient(90deg, var(--stripe-a, var(--elem-color)), var(--stripe-b, var(--elem-color)), var(--stripe-a, var(--elem-color)));
  box-shadow: 0 0 8px var(--elem-glow, rgba(255,255,255,.2));
  z-index: 1;
}

.card-inner {
  position: relative; z-index: 2;
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center;
  padding: clamp(4px,.7vw,6px) clamp(3px,.5vw,5px) clamp(2px,.4vw,4px);
  gap: 1px;
  border-radius: inherit;
  overflow: hidden;
  transition: opacity var(--flip-dur) var(--flip-ease) calc(var(--flip-i,0) * var(--flip-stagger));
}

/* Press effect */
.card.selectable:active:not(.dead) {
  transform: translateY(3px) scale(.97) !important;
  box-shadow: 0 1px 0 rgba(0,0,0,.5), 0 2px 6px rgba(0,0,0,.4) !important;
  transition: transform .06s ease-out !important;
}

.card.selectable {
  cursor: pointer;
  border-color: rgba(26,42,78,.12);
  box-shadow: 0 4px 0 rgba(0,0,0,.12), 0 6px 14px rgba(0,0,0,.1);
}
.card.selectable:hover:not(.dead) {
  transform: translateY(-5px) scale(1.05);
  border-color: var(--elem-color);
  box-shadow: 0 9px 0 rgba(0,0,0,.4), 0 14px 28px rgba(0,0,0,.6), 0 0 24px var(--elem-glow, rgba(201,150,58,.3));
}

@keyframes bounceSelect {
  0%   { transform: translateY(-3px) scale(1.02); }
  40%  { transform: translateY(-9px) scale(1.06); }
  65%  { transform: translateY(-1px) scale(1.01); }
  80%  { transform: translateY(-5px) scale(1.04); }
  100% { transform: translateY(-3px) scale(1.02); }
}

.card.selected {
  border-color: var(--elem-color) !important;
  box-shadow:
    0 6px 0 rgba(0,0,0,.2),
    0 0 0 2px var(--elem-color),
    0 0 30px var(--elem-glow),
    0 10px 22px rgba(0,0,0,.2) !important;
  animation: bounceSelect .4s cubic-bezier(.34,1.56,.64,1) forwards !important;
}
.card.used    { border-color:rgba(201,150,58,.5)!important; box-shadow:0 0 12px rgba(201,150,58,.3)!important; opacity:.75; }
.card.dead    { opacity:.2; filter:grayscale(1) blur(1px); cursor:default; pointer-events:none; }
.card.disabled { opacity:.4; cursor:default; pointer-events:none; }

/* ── Card glow ── */
.card-glow {
  position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 1;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, var(--elem-glow, rgba(201,150,58,.2)) 0%, transparent 60%);
  opacity: 0; transition: opacity .3s;
}
.card.selectable:hover .card-glow,
.card.selected .card-glow { opacity: 1; }

/* ── Card stats ── */
.card-stats {
  width: 100%; display: flex; justify-content: space-between;
  flex-shrink: 0; padding: 0;
}
.cs-atk, .cs-def {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(7px, 1.05vw, 9.5px);
  font-weight: 800; line-height: 1;
  padding: 1px 2px; border-radius: 3px;
}
.cs-atk { color: #cc2200; background: rgba(230,48,32,.10); }
.cs-def { color: #1565c0; background: rgba(21,101,192,.10); }

/* ── Card icon ── */
.card-icon-area {
  flex: 1; display: flex; align-items: flex-end; justify-content: center;
  align-self: stretch;
  padding: 0;
  /* overflow: visible permite que personagens "saiam" levemente da área */
  overflow: visible;
  flex-shrink: 0; position: relative;
  min-height: 0;
}
/* hero-img: preenche todo o espaço disponível, alinhado para baixo */
.hero-img {
  width: 100%;
  height: 110%;        /* levemente maior que o container — personagem "vivo" */
  object-fit: contain;
  object-position: center bottom;
  filter: drop-shadow(0 2px 10px var(--elem-glow, rgba(255,255,255,.3)));
  animation: iconIdle 3.2s ease-in-out infinite;
  transform-origin: center bottom;
}
/* fallback emoji quando PNG não carrega */
.card-icon-area[data-fallback]::after {
  content: attr(data-fallback);
  font-size: clamp(28px, 5.2vw, 44px);
  line-height: 1;
}
.card.selectable .hero-img { animation: iconIdleActive 2.4s ease-in-out infinite; }
.card.selected .hero-img {
  animation: iconIdleSelected 1.8s ease-in-out infinite;
  filter: drop-shadow(0 0 12px var(--elem-glow)) drop-shadow(0 2px 6px rgba(0,0,0,.5));
}
/* ── Per-character idle animations — each has its own personality ──────────── */
/* All use --anim-offset (set per-card in JS) to desync timing */

/* Rex: agitado, enérgico — movimentos rápidos e bruscos */
@keyframes idleRex {
  0%   { transform: translateY(0)    scale(1)    rotate(0deg); }
  15%  { transform: translateY(-4px) scale(1.06) rotate(1.2deg); }
  30%  { transform: translateY(1px)  scale(.97)  rotate(-.8deg); }
  50%  { transform: translateY(-3px) scale(1.04) rotate(.9deg); }
  70%  { transform: translateY(2px)  scale(.98)  rotate(-.5deg); }
  85%  { transform: translateY(-2px) scale(1.02) rotate(.4deg); }
  100% { transform: translateY(0)    scale(1)    rotate(0deg); }
}
/* Marina: fluido, ondulante — como água */
@keyframes idleMarina {
  0%   { transform: translateY(0)    scale(1)    rotate(0deg); }
  20%  { transform: translateY(-3px) scale(1.03) rotate(.5deg); }
  40%  { transform: translateY(1.5px) scale(.99) rotate(-.3deg); }
  60%  { transform: translateY(-2px) scale(1.02) rotate(.4deg); }
  80%  { transform: translateY(1px)  scale(.99)  rotate(-.2deg); }
  100% { transform: translateY(0)    scale(1)    rotate(0deg); }
}
/* Guto: pesado, lento — balanços grandes e pausados */
@keyframes idleGuto {
  0%   { transform: translateY(0)    scale(1)    rotate(0deg); }
  25%  { transform: translateY(-2px) scale(1.04) rotate(1.5deg); }
  55%  { transform: translateY(2px)  scale(.97)  rotate(-1deg); }
  80%  { transform: translateY(-1px) scale(1.01) rotate(.5deg); }
  100% { transform: translateY(0)    scale(1)    rotate(0deg); }
}
/* Asa: leve, aéreo — flutua com leveza, quase não toca o chão */
@keyframes idleAsa {
  0%   { transform: translateY(0)    scale(1)    rotate(0deg); }
  18%  { transform: translateY(-5px) scale(1.04) rotate(.6deg); }
  36%  { transform: translateY(-3px) scale(1.02) rotate(-.4deg); }
  54%  { transform: translateY(-4px) scale(1.03) rotate(.5deg); }
  72%  { transform: translateY(-1px) scale(1.01) rotate(-.2deg); }
  100% { transform: translateY(0)    scale(1)    rotate(0deg); }
}
/* Faísca: nervoso, elétrico — pequenos tremores rápidos */
@keyframes idleFaisca {
  0%   { transform: translateY(0)    scale(1)    rotate(0deg); }
  10%  { transform: translateY(-2px) scale(1.02) rotate(.3deg); }
  20%  { transform: translateY(1px)  scale(.99)  rotate(-.2deg); }
  30%  { transform: translateY(-3px) scale(1.04) rotate(.7deg); }
  45%  { transform: translateY(1px)  scale(.98)  rotate(-.5deg); }
  60%  { transform: translateY(-2px) scale(1.03) rotate(.4deg); }
  75%  { transform: translateY(0)    scale(1.01) rotate(-.1deg); }
  88%  { transform: translateY(-1px) scale(1.02) rotate(.2deg); }
  100% { transform: translateY(0)    scale(1)    rotate(0deg); }
}

/* Duration per character (base, JS adds offset for desync) */
.card.rex    .hero-img { animation: idleRex    2.8s ease-in-out var(--anim-offset, 0s) infinite; }
.card.marina .hero-img { animation: idleMarina 3.8s ease-in-out var(--anim-offset, 0s) infinite; }
.card.guto   .hero-img { animation: idleGuto   4.4s ease-in-out var(--anim-offset, 0s) infinite; }
.card.asa    .hero-img { animation: idleAsa    3.2s ease-in-out var(--anim-offset, 0s) infinite; }
.card.faisca .hero-img { animation: idleFaisca 2.2s ease-in-out var(--anim-offset, 0s) infinite; }

/* Selectable: ligeiramente mais vivo */
.card.selectable.rex    .hero-img { animation: idleRex    2.0s ease-in-out var(--anim-offset, 0s) infinite; }
.card.selectable.marina .hero-img { animation: idleMarina 2.8s ease-in-out var(--anim-offset, 0s) infinite; }
.card.selectable.guto   .hero-img { animation: idleGuto   3.2s ease-in-out var(--anim-offset, 0s) infinite; }
.card.selectable.asa    .hero-img { animation: idleAsa    2.4s ease-in-out var(--anim-offset, 0s) infinite; }
.card.selectable.faisca .hero-img { animation: idleFaisca 1.6s ease-in-out var(--anim-offset, 0s) infinite; }

/* No focus overlay: pulse suave comum */
@keyframes focusIconPulse {
  0%,100% { transform: scale(1)    translateY(0);   }
  35%     { transform: scale(1.06) translateY(-5px); }
  65%     { transform: scale(1.03) translateY(-2px); }
}

/* ── Card name ── */
.card-name {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(7.5px, 1.2vw, 10px);
  font-weight: 800; letter-spacing: .3px;
  text-align: center; color: var(--text);
  flex-shrink: 0;
  text-shadow: none;
}

/* ── HP Hearts ── */
.card-hp-hearts {
  display: flex; justify-content: center;
  gap: clamp(1px, 0.3vw, 2px);
  flex-wrap: wrap; flex-shrink: 0;
  padding-top: 1px;
}
.hp-heart { font-size: clamp(6px, 1vw, 8.5px); line-height: 1; display: inline-block; transition: transform .2s, opacity .2s; filter: drop-shadow(0 1px 2px rgba(0,0,0,.5)); }
.hp-heart.full  { opacity: .9; }
.hp-heart.empty { opacity: .14; filter: grayscale(1); }

/* ── PPR Tray (inside selected card) ── */
.card-ppr-tray {
  display: none;
  justify-content: center;
  gap: clamp(3px, .6vw, 5px);
  padding-top: 2px;
  flex-shrink: 0;
  width: 100%;
}
.card.selected .card-ppr-tray { display: flex; }
.ppr-pill {
  width: clamp(22px, 4vw, 34px);
  height: clamp(22px, 4vw, 34px);
  border-radius: clamp(8px, 1.5vw, 12px);
  background: rgba(255,255,255,.9);
  border: 2px solid rgba(26,42,78,.15);
  color: var(--text);
  font-size: clamp(11px, 2vw, 17px);
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  box-shadow: 0 3px 0 rgba(0,0,0,.15), 0 4px 8px rgba(0,0,0,.1);
  transition: transform .1s, box-shadow .1s, background .15s, border-color .15s;
  position: relative;
}
.ppr-pill:hover { background:rgba(255,184,0,.2); border-color:var(--gold); transform:translateY(-2px); box-shadow:0 5px 0 rgba(0,0,0,.15),0 6px 12px rgba(0,0,0,.1); }
.ppr-pill:active { transform:translateY(2px) !important; box-shadow:0 1px 0 rgba(0,0,0,.15) !important; }
.ppr-pill.chosen {
  background: rgba(255,184,0,.35); border-color: var(--gold);
  box-shadow: 0 3px 0 var(--gold-dk), 0 0 12px var(--gold-glow), 0 4px 8px rgba(0,0,0,.15);
  transform: translateY(-1px);
  animation: pillChosen .3s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes pillChosen { 0%{transform:translateY(-1px) scale(1)} 50%{transform:translateY(-4px) scale(1.15)} 100%{transform:translateY(-1px) scale(1.05)} }

/* ── JOGAR button — embedded inside selected card, below deck ── */
#play-btn-p1, #play-btn-p2 {
  display: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: clamp(10px, 1.8vw, 14px);
  letter-spacing: 1.5px;
  white-space: nowrap;
  padding: 8px 20px;
  border-radius: 50px;
  background: linear-gradient(160deg, #ff9500, #ffca00, #ff8c00);
  border: 2.5px solid #ffdf00;
  color: #1a0800;
  text-shadow: 0 1px 0 rgba(255,255,255,.45);
  box-shadow: 0 4px 0 #9a5000, 0 6px 20px rgba(0,0,0,.55), 0 0 24px rgba(255,170,0,.4);
  cursor: pointer;
  transition: transform .1s, box-shadow .1s, opacity .2s;
}
#play-btn-p1.btn-ready, #play-btn-p2.btn-ready {
  display: block;
  animation: playBtnBounce .75s ease-in-out infinite;
}
#play-btn-p1.btn-wait, #play-btn-p2.btn-wait {
  display: block;
  background: linear-gradient(160deg, rgba(80,70,50,.35), rgba(60,50,30,.35));
  border-color: rgba(201,150,58,.2);
  color: rgba(201,150,58,.35);
  text-shadow: none;
  box-shadow: 0 2px 0 rgba(0,0,0,.4);
  cursor: default;
  pointer-events: none;
  animation: none;
  filter: none;
  opacity: 1;
}
@keyframes playBtnBounce {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.05); box-shadow: 0 6px 0 #9a5000, 0 8px 26px rgba(0,0,0,.5), 0 0 40px rgba(255,170,0,.6); }
}
#play-btn-p1:active, #play-btn-p2:active {
  transform: translateY(3px) !important;
  box-shadow: 0 1px 0 #9a5000, 0 3px 10px rgba(0,0,0,.5) !important;
  animation: none !important;
}

/* ── BATTLE FX ── */
.card-battle-fx {
  position: absolute; inset: 0; border-radius: inherit; pointer-events: none; z-index: 3; overflow: hidden;
}
.card-battle-fx.fx-attack::before {
  content: ''; position: absolute; top: -30%; left: -20%; width: 60%; height: 160%;
  background: linear-gradient(105deg, transparent 0%, rgba(255,255,255,.04) 35%, rgba(255,255,255,.55) 48%, rgba(255,255,255,.65) 50%, rgba(255,255,255,.55) 52%, rgba(255,255,255,.04) 65%, transparent 100%);
  animation: fxAttackSlash .45s cubic-bezier(.2,0,.4,1) forwards;
}
.card-battle-fx.fx-attack::after {
  content: ''; position: absolute; top: -30%; left: 10%; width: 40%; height: 160%;
  background: linear-gradient(108deg, transparent 0%, rgba(255,255,255,.02) 30%, rgba(255,255,255,.3) 48%, rgba(255,255,255,.35) 50%, rgba(255,255,255,.3) 52%, rgba(255,255,255,.02) 70%, transparent 100%);
  animation: fxAttackSlash .45s .06s cubic-bezier(.2,0,.4,1) forwards;
}
@keyframes fxAttackSlash { 0%{transform:translateX(-120%) skewX(-8deg);opacity:0} 15%{opacity:1} 85%{opacity:.8} 100%{transform:translateX(220%) skewX(-8deg);opacity:0} }
.card.fx-attacker { animation: fxAttackerBurst .5s ease-out forwards; }
@keyframes fxAttackerBurst { 0%{box-shadow:0 4px 0 rgba(0,0,0,.5),0 6px 14px rgba(0,0,0,.5)} 25%{box-shadow:0 0 0 3px var(--elem-color),0 0 40px var(--elem-glow),0 0 80px var(--elem-glow);transform:scale(1.06)} 60%{transform:scale(1.02)} 100%{box-shadow:0 4px 0 rgba(0,0,0,.5),0 6px 14px rgba(0,0,0,.5);transform:scale(1)} }
.card.fx-damage { animation: fxDamageShake .5s ease-out forwards; }
@keyframes fxDamageShake { 0%{transform:translateX(0)} 10%{transform:translateX(-6px) scale(.98);filter:brightness(2.5) saturate(0) sepia(1) hue-rotate(-20deg)} 25%{transform:translateX(5px);filter:brightness(2) saturate(.3)} 40%{transform:translateX(-4px)} 55%{transform:translateX(3px)} 70%{transform:translateX(-2px)} 85%{transform:translateX(1px)} 100%{transform:translateX(0);filter:brightness(1)} }
.card-battle-fx.fx-damage-hit { background:rgba(255,50,30,.0); animation:fxDmgFlash .45s ease-out forwards; }
@keyframes fxDmgFlash { 0%{background:rgba(255,50,30,.0)} 15%{background:rgba(255,50,30,.75);box-shadow:inset 0 0 30px rgba(255,0,0,.6)} 50%{background:rgba(255,50,30,.25)} 100%{background:rgba(255,50,30,.0)} }
.card.fx-tie { animation:fxTiePulse .6s ease-out forwards; }
@keyframes fxTiePulse { 0%{filter:brightness(1)} 30%{filter:brightness(1.6) saturate(.2);transform:scale(1.03)} 60%{filter:brightness(.85) saturate(.5)} 100%{filter:brightness(1);transform:scale(1)} }
.card.fx-destroyed { animation:fxDestroyed .7s ease-in forwards; }
@keyframes fxDestroyed { 0%{filter:brightness(1);transform:scale(1)} 20%{filter:brightness(3) saturate(0);transform:scale(1.08)} 50%{transform:scale(.9);opacity:.5;filter:grayscale(1) brightness(.6)} 100%{transform:scale(.8);opacity:.15;filter:grayscale(1) blur(2px)} }
.card-battle-fx.fx-win-beam::before {
  content:''; position:absolute; bottom:0; left:20%; right:20%; height:0;
  background:linear-gradient(to top, var(--elem-glow), transparent);
  animation:fxWinBeam .9s ease-out forwards;
}
@keyframes fxWinBeam { 0%{height:0;opacity:.8} 60%{height:120%;opacity:.6} 100%{height:130%;opacity:0} }
.card-battle-fx.fx-shockwave::before {
  content:''; position:absolute; top:50%; left:50%; width:20px; height:20px; margin:-10px 0 0 -10px;
  border-radius:50%; border:3px solid var(--elem-color,rgba(255,220,100,.9));
  animation:fxShockwave .5s ease-out forwards; z-index:10;
}
@keyframes fxShockwave { 0%{transform:scale(.2);opacity:1} 60%{transform:scale(3.5);opacity:.6} 100%{transform:scale(5);opacity:0} }

/* Strike animations — card lunges toward opponent (they are vertically stacked) */
.card.fx-strike-p1 { animation:strikeP1 .55s cubic-bezier(.2,0,.4,1) forwards; z-index:50; }
@keyframes strikeP1 {
  0%{transform:translateY(0) scale(1);filter:brightness(1)}
  15%{transform:translateY(-8px) scale(1.04);filter:brightness(1.3)}
  38%{transform:translateY(-28px) scale(1.08) rotate(-2deg);filter:brightness(1.6) drop-shadow(0 0 12px var(--elem-glow))}
  55%{transform:translateY(-32px) scale(1.1) rotate(-3deg)}
  70%{transform:translateY(-10px) scale(1.03) rotate(-1deg);filter:brightness(1.1)}
  88%{transform:translateY(4px) scale(.98)}
  100%{transform:translateY(0) scale(1);filter:brightness(1)}
}
.card.fx-strike-p2 { animation:strikeP2 .55s cubic-bezier(.2,0,.4,1) forwards; z-index:50; }
@keyframes strikeP2 {
  0%{transform:translateY(0) scale(1);filter:brightness(1)}
  15%{transform:translateY(8px) scale(1.04);filter:brightness(1.3)}
  38%{transform:translateY(28px) scale(1.08) rotate(2deg);filter:brightness(1.6) drop-shadow(0 0 12px var(--elem-glow))}
  55%{transform:translateY(32px) scale(1.1) rotate(3deg)}
  70%{transform:translateY(10px) scale(1.03) rotate(1deg);filter:brightness(1.1)}
  88%{transform:translateY(-4px) scale(.98)}
  100%{transform:translateY(0) scale(1);filter:brightness(1)}
}

/* ── Damage particles ── */
.dmg-particle {
  position: fixed; pointer-events: none; z-index: 600;
  font-family: 'Nunito', sans-serif; font-weight: 900;
  font-size: clamp(20px, 4vw, 32px);
  text-shadow: 0 0 8px currentColor, 0 2px 0 rgba(0,0,0,.9), 2px 2px 0 rgba(0,0,0,.6);
  transform-origin: center center;
  animation: personaDmg 1.9s cubic-bezier(.22,1,.36,1) forwards;
  margin-left: -20px; margin-top: -20px;
}
.dmg-particle.dmg-big {
  font-size: clamp(28px, 5.5vw, 44px);
  animation: personaDmgBig 2.2s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes personaDmg {
  0%{opacity:0;transform:scale(.3) translateY(10px) rotate(-8deg)}
  12%{opacity:1;transform:scale(1.35) translateY(-12px) rotate(4deg)}
  22%{transform:scale(.95) translateY(-8px) rotate(-2deg)}
  32%{transform:scale(1.08) translateY(-14px) rotate(1deg)}
  48%{opacity:1;transform:scale(1) translateY(-18px) rotate(0deg)}
  75%{opacity:.9;transform:scale(1) translateY(-38px) rotate(0deg)}
  100%{opacity:0;transform:scale(.7) translateY(-65px) rotate(0deg)}
}
@keyframes personaDmgBig {
  0%{opacity:0;transform:scale(.2) translateY(14px) rotate(-12deg)}
  10%{opacity:1;transform:scale(1.5) translateY(-16px) rotate(6deg)}
  20%{transform:scale(.88) translateY(-10px) rotate(-3deg)}
  30%{transform:scale(1.15) translateY(-18px) rotate(2deg)}
  45%{opacity:1;transform:scale(1.05) translateY(-22px) rotate(0deg)}
  72%{opacity:.85;transform:scale(1) translateY(-52px)}
  100%{opacity:0;transform:scale(.6) translateY(-80px)}
}
.burst-dot {
  position: fixed; pointer-events: none; z-index: 599;
  width: 6px; height: 6px; border-radius: 50%;
  animation: burstDot .7s ease-out forwards;
}
@keyframes burstDot { 0%{opacity:1;transform:scale(1) translate(0,0)} 100%{opacity:0;transform:scale(.3) translate(var(--dx),var(--dy))} }

/* ═══════════════════════════════════════════════════════════════
   v19 CARD FLIP SYSTEM — per-card data-face + opacity
   ───────────────────────────────────────────────────────────────
   Model: each .card carries data-face="up|down"
   Face state = opacity on .card-inner (front) and .card-back
   No rotateY on card element. No preserve-3d. No backface-visibility.
   No flipLock. No rAF. Zero inheritance conflicts.
   ═══════════════════════════════════════════════════════════════ */
:root {
  --flip-dur:      420ms;
  --flip-ease:     cubic-bezier(.4, 0, .2, 1);
  --flip-stagger:  55ms;
  --deck-scale-inactive: 0.82;
  --deck-opacity-inactive: 0.55;
  --deck-scale-dur: 300ms;
  --deck-scale-ease: cubic-bezier(.4, 0, .2, 1);

}

/* ── Deck wrapper scale — driven by data-deck-state ── */
.deck-wrap {
  transform-origin: center center;
  transition:
    transform var(--deck-scale-dur) var(--deck-scale-ease),
    opacity   var(--deck-scale-dur) var(--deck-scale-ease);
}
.deck-wrap[data-deck-state="inactive"] {
  transform: scale(var(--deck-scale-inactive));
  opacity: var(--deck-opacity-inactive);
  pointer-events: none;
}
.deck-wrap[data-deck-state="active"] {
  transform: scale(1);
  opacity: 1;
}

/* ── Deck wake animation — when inactive→active ── */
@keyframes deckWakeUp {
  0%   { transform: scale(var(--deck-scale-inactive)); opacity: var(--deck-opacity-inactive); }
  55%  { transform: scale(1.03); opacity: 1; }
  80%  { transform: scale(.985); }
  100% { transform: scale(1);    opacity: 1; }
}
.deck-wrap[data-deck-state="waking"] {
  animation: deckWakeUp 420ms cubic-bezier(.34,1.56,.64,1) forwards;
  pointer-events: none; /* block clicks during wake */
}

/* ── Card base transition (hover/press effects) ── */
.card {
  transition:
    transform .18s cubic-bezier(.34,1.56,.64,1),
    box-shadow .18s,
    border-color .18s;
}

/* face-down: pointer events off, cursor reset */
.card[data-face="down"] {
  cursor: default !important;
  pointer-events: none !important;
}

/* face-up while unflipping — no extra rules needed,
   .card-inner opacity transition handles the reveal */

/* ─────────────────────────────────────────────────────────────
   ZONE EMPHASIS SYSTEM v2 — expanding active zone
   Classes toggled by applyZoneEmphasis(activePlayer)
   ───────────────────────────────────────────────────────────── */

/* Base transition on all player zones */
.player-zone {
  transition:
    flex        var(--zone-scale-dur) var(--zone-scale-ease),
    opacity     var(--zone-scale-dur) cubic-bezier(.4, 0, .2, 1),
    background  .4s ease;
  transform-origin: center center;
}

/* Active zone: ~70% of vertical space */
.player-zone.zone-turn-active {
  flex: 7 1 0%;
  opacity: 1;
  filter: none;
}

/* Inactive zone: ~30% */
.player-zone.zone-turn-inactive {
  flex: 3 1 0%;
  opacity: var(--zone-inactive-opacity);
  filter: saturate(0.55);
}

/* P2 rotation — no transform scale, just the base rotation */
#zone-p2 { transform: rotate(180deg); }
#zone-p2.zone-turn-active   { transform: rotate(180deg); }
#zone-p2.zone-turn-inactive { transform: rotate(180deg); }

/* ── Cards in ACTIVE zone: larger, wrap into 3+2 rows ── */
.player-zone.zone-turn-active .deck-wrap {
  flex-wrap: wrap;
  align-content: center;
  max-width: calc(3 * var(--card-active-w) + 2 * clamp(8px,1.2vw,16px));
  gap: clamp(8px,1.2vw,16px);
}

.player-zone.zone-turn-active .card {
  width:  var(--card-active-w);
  height: var(--card-active-h);
  transition:
    width  var(--zone-scale-dur) var(--zone-scale-ease),
    height var(--zone-scale-dur) var(--zone-scale-ease),
    transform .18s cubic-bezier(.34,1.56,.64,1),
    box-shadow .18s, border-color .18s;
}

/* ── Cards in INACTIVE zone: shrunk ~30%, single row ── */
.player-zone.zone-turn-inactive .deck-wrap {
  flex-wrap: nowrap;
  gap: clamp(3px,.5vw,6px);
  max-width: 100%;
}

.player-zone.zone-turn-inactive .card {
  width:  var(--card-inactive-w);
  height: var(--card-inactive-h);
  cursor: default !important;
  transition:
    width  var(--zone-scale-dur) var(--zone-scale-ease),
    height var(--zone-scale-dur) var(--zone-scale-ease),
    transform .18s cubic-bezier(.34,1.56,.64,1),
    box-shadow .18s, border-color .18s;
}

/* Inactive cards: hide text, keep icon */
.player-zone.zone-turn-inactive .card-name,
.player-zone.zone-turn-inactive .card-hp-hearts,
.player-zone.zone-turn-inactive .cs-row,
.player-zone.zone-turn-inactive .ppr-tray {
  opacity: 0;
  transition: opacity var(--zone-scale-dur) ease;
}
.player-zone.zone-turn-inactive .card-icon-area {
  opacity: 0.7;
  transition: opacity var(--zone-scale-dur) ease;
}

/* Active zone cards: show everything */
.player-zone.zone-turn-active .card-name,
.player-zone.zone-turn-active .card-hp-hearts,
.player-zone.zone-turn-active .cs-row,
.player-zone.zone-turn-active .card-icon-area {
  opacity: 1;
  transition: opacity var(--zone-scale-dur) ease;
}

/* ── REVEAL overlay ── */
#reveal-focus {
  position:fixed; inset:0; z-index:250;
  background:rgba(214,238,255,.92); backdrop-filter:blur(4px) saturate(.9);
  pointer-events:none; align-items:center; justify-content:center;
  display:flex; opacity:0; transition:opacity .5s ease;
  flex-direction: column; gap: 18px;
}
#reveal-focus.show   { opacity:1; pointer-events:all; }
#reveal-focus.hiding { opacity:0; pointer-events:none; }

#reveal-label {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: clamp(12px, 2.2vw, 20px);
  color: var(--text);
  letter-spacing: 3px;
  text-transform: uppercase;
  animation: revealLabelPulse 1.8s ease-in-out infinite;
}
@keyframes revealLabelPulse { 0%,100%{opacity:.7} 50%{opacity:1} }

#btn-reveal {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: clamp(16px, 2.8vw, 24px);
  letter-spacing: 2px;
  padding: 16px 44px;
  border-radius: 50px;
  border: 3px solid #ffdf00;
  background: linear-gradient(160deg, #ff8c00, #ffba00, #ff8c00);
  color: #1a0a00;
  cursor: pointer;
  position: relative; z-index:251;
  white-space: nowrap;
  text-shadow: 0 1px 0 rgba(255,255,255,.4);
  box-shadow: 0 8px 0 #b85e00, 0 10px 28px rgba(0,0,0,.6), 0 0 50px rgba(255,180,0,.5), 0 0 100px rgba(255,180,0,.25);
  animation: revealBounce 0.9s ease-in-out infinite;
  transition: transform .1s, box-shadow .1s;
}
#btn-reveal:active {
  transform: translateY(6px) !important;
  box-shadow: 0 2px 0 #b85e00, 0 4px 14px rgba(0,0,0,.5) !important;
  animation: none !important;
}
@keyframes revealBounce {
  0%,100%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-7px) scale(1.04)}
}

/* ── Hint text in reveal ── */
#reveal-sub {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(9px, 1.4vw, 12px);
  color: var(--text-dim);
  letter-spacing: 2px;
}

/* ── Result toast ── */
#result-toast {
  position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
  z-index:1000; display:flex; align-items:center; justify-content:center;
  pointer-events:none; opacity:0; transition:opacity .4s ease;
}
#result-toast.show { opacity:1; pointer-events:auto; }
#toast-inner {
  background:rgba(255,255,255,.96); border:2px solid rgba(255,184,0,.5);
  border-radius:12px; padding:12px 22px 10px; text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.18),0 0 20px rgba(255,184,0,.15);
  min-width:220px; max-width:360px;
  overflow:hidden;
}
#toast-main { font-family:'Nunito',sans-serif; font-weight:900; font-size:clamp(11px,1.8vw,15px); color:var(--text); letter-spacing:.5px; margin-bottom:4px; }
#toast-sub  { font-family:'Nunito',serif; font-size:clamp(9px,1.4vw,11px); color:var(--text-dim); }

/* Barra de progresso do toast */
#toast-progress-wrap {
  margin-top:10px;
  height:3px;
  background:rgba(255,255,255,.08);
  border-radius:3px;
  overflow:hidden;
}
#toast-progress-bar {
  height:100%; width:100%;
  background:linear-gradient(90deg,var(--gold-dk),var(--gold-lt));
  border-radius:3px;
  transform-origin:left;
  transform:scaleX(1);
  transition:none;
}
#toast-progress-bar.draining {
  transition:transform linear;
}

#gameover-screen {
  position:fixed; inset:0; z-index:2000; background:rgba(214,238,255,.92);
  backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center;
}
#gameover-screen.show { display:flex; }
#gameover-box {
  background:var(--surface); border:3px solid var(--gold);
  border-radius:24px; padding:32px 40px; text-align:center;
  box-shadow:0 0 60px rgba(255,184,0,.3),0 20px 60px rgba(0,0,0,.15);
  display:flex; flex-direction:column; gap:16px; align-items:center;
}
#go-crown { font-size:44px; animation:crownBounce 1s ease-in-out infinite; }
@keyframes crownBounce { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-8px) rotate(5deg)} }
#go-title    { font-family:'Nunito',sans-serif; font-weight:900; font-size:clamp(18px,3.5vw,28px); color:var(--text); }
#go-subtitle { font-family:'Nunito',sans-serif; font-size:clamp(10px,1.6vw,13px); color:var(--text-dim); }
.btn-confirm {
  font-family:'Nunito',sans-serif; font-weight:900;
  font-size:clamp(11px,1.8vw,15px); letter-spacing:1px;
  padding:12px 28px; border-radius:50px;
  border:3px solid var(--gold);
  background:linear-gradient(160deg, #ffca00, #ffb800, #ff9500);
  color:#1a0800; cursor:pointer;
  box-shadow:0 4px 0 var(--gold-dk),0 6px 20px rgba(0,0,0,.2);
  transition:transform .1s,box-shadow .1s;
}
.btn-confirm:hover { transform:translateY(-3px); box-shadow:0 7px 0 var(--gold-dk),0 0 24px rgba(255,184,0,.4); }
.btn-confirm:active { transform:translateY(3px)!important; box-shadow:0 1px 0 var(--gold-dk)!important; }

/* ── Hint label ── */
.zone-hint {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: clamp(7px, 1.05vw, 9px);
  letter-spacing: 1px;
  color: rgba(26,42,78,.5);
  white-space: nowrap;
  pointer-events: none;
  min-height: 14px;
  transition: color .3s, letter-spacing .3s;
}
.zone-hint.ppr-prompt {
  color: var(--text);
  letter-spacing: 2px;
  animation: hintPulse 1.1s ease-in-out infinite;
}
.zone-hint.ready-prompt {
  color: #178a30;
  letter-spacing: 2px;
}
@keyframes hintPulse { 0%,100%{opacity:.6} 50%{opacity:1} }

/* ═══════════════════════════════════════════════════════════════
   DESKTOP SCALING — min-width: 1024px
   All sizing re-tuned for large screens. Mobile values untouched.
   ═══════════════════════════════════════════════════════════════ */
@media (min-width: 1024px) {

  /* ── Player zones: use available vertical space better ── */
  .player-zone {
    padding: clamp(16px, 2.2vh, 32px) clamp(24px, 3vw, 60px);
    gap: clamp(10px, 1.4vh, 20px);
  }

  /* ── Cards: desktop sizes set via zone vars ── */
  .card {
    border-radius: 16px;
  }
  :root {
    --card-active-w:   clamp(120px, 11vw, 160px);
    --card-active-h:   clamp(168px, 15.4vw, 224px);
    --card-inactive-w: clamp(64px,  6vw,  88px);
    --card-inactive-h: clamp(90px,  8.4vw, 123px);
  }

  /* ── Deck gap and perspective ── */
  .deck-wrap {
    gap: clamp(10px, 1.2vw, 18px);
    perspective: 1200px;
  }

  /* ── Card typography ── */
  .card-name {
    font-size: clamp(9px, 0.9vw, 13px);
  }
  .cs-atk, .cs-def {
    font-size: clamp(9px, 0.85vw, 12px);
  }
  /* card-icon-area: usa hero-img width/height, font-size não é mais relevante */
  .hp-heart {
    font-size: clamp(8px, 0.85vw, 12px);
  }

  /* ── PPR tray pills ── */
  .ppr-pill {
    width:  clamp(34px, 3.2vw, 46px);
    height: clamp(34px, 3.2vw, 46px);
    font-size: clamp(16px, 1.6vw, 22px);
    border-radius: clamp(10px, 1vw, 14px);
  }

  /* ── HP bar ── */
  .player-hp-bar-wrap {
    width: clamp(260px, 38%, 520px);
    gap: 10px;
  }
  .php-bar     { height: 13px; border-radius: 8px; }
  .php-label   { font-size: clamp(8px, 0.85vw, 11px); letter-spacing: 1.5px; }
  .php-num     { font-size: clamp(9px, 0.9vw, 13px); }

  /* ── Turn badge ── */
  .turn-badge {
    font-size: clamp(9px, 0.85vw, 12px);
    padding: 4px 14px;
    letter-spacing: 1.5px;
  }

  /* ── Zone hint ── */
  .zone-hint {
    font-size: clamp(9px, 0.9vw, 12px);
    letter-spacing: 2px;
    min-height: 18px;
  }

  /* ── Round counter ── */
  #round-counter {
    font-size: clamp(9px, 0.85vw, 12px);
    padding: 4px 16px;
    letter-spacing: 2.5px;
  }

  /* ── JOGAR button ── */
  #play-btn-p1, #play-btn-p2 {
    font-size: clamp(13px, 1.2vw, 18px);
    padding: 12px 32px;
    border-radius: 60px;
    border-width: 3px;
  }

  /* ── REVELAR button ── */
  #btn-reveal {
    font-size: clamp(20px, 2vw, 30px);
    padding: 20px 60px;
    border-radius: 60px;
    border-width: 3.5px;
  }
  #reveal-label {
    font-size: clamp(14px, 1.6vw, 24px);
    letter-spacing: 5px;
  }
  #reveal-sub {
    font-size: clamp(11px, 1vw, 15px);
    letter-spacing: 2.5px;
  }

  /* ── Divider ── */
  #field-divider {
    margin: 0 clamp(40px, 8vw, 140px);
  }

  /* ── Damage particles ── */
  .dmg-particle {
    font-size: clamp(28px, 3vw, 44px);
  }
  .dmg-particle.dmg-big {
    font-size: clamp(36px, 4vw, 56px);
  }

  /* ── Game Over box ── */
  #gameover-box {
    padding: 44px 60px;
    gap: 20px;
  }
  #go-crown  { font-size: 58px; }
  #go-title  { font-size: clamp(22px, 2.4vw, 36px); }
  #go-subtitle { font-size: clamp(12px, 1.1vw, 16px); }
  .btn-confirm {
    font-size: clamp(13px, 1.2vw, 18px);
    padding: 16px 36px;
    border-width: 3px;
  }

}

/* ── XL screens (1440px+): push card size to max ── */
@media (min-width: 1440px) {
  :root {
    --card-active-w:   clamp(148px, 10vw, 180px);
    --card-active-h:   clamp(207px, 14vw, 252px);
    --card-inactive-w: clamp(76px,  5.5vw, 100px);
    --card-inactive-h: clamp(107px, 7.7vw, 140px);
  }
  .deck-wrap { gap: clamp(14px, 1.2vw, 22px); }
  .player-hp-bar-wrap { width: clamp(300px, 36%, 600px); }
}

/* ═══════════════════════════════════════════════════════════════
   CARD FOCUS OVERLAY — v20: carta domina a tela, PPR embaixo
   ═══════════════════════════════════════════════════════════════ */

/* Full-screen backdrop — dois estágios de blur para não achatar */
#card-focus-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(214,238,255,.92);
  backdrop-filter: blur(8px) saturate(.85);
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: clamp(16px, 3vh, 36px) clamp(12px, 4vw, 40px) clamp(20px, 4vh, 44px);
  pointer-events: none;
  opacity: 0;
  transition: opacity .36s ease;
}
#card-focus-overlay.show { opacity: 1; pointer-events: all; }

/* ── Carta grande — ocupa todo o espaço vertical disponível ── */
#focus-card-clone {
  /* Cresce para preencher a tela — limitado pelo menor eixo */
  width:  min(72vw, 52vh, 360px);
  height: min(100vw, 72vh, 500px);
  border-radius: clamp(16px, 2.5vw, 28px);
  background: var(--focus-bg-solid, #1565c0);
  border: 2.5px solid var(--focus-elem-color, rgba(255,255,255,.2));
  box-shadow:
    0 12px 0 rgba(0,0,0,.13),
    0 18px 60px rgba(0,0,0,.14),
    0 0  60px var(--focus-elem-glow, rgba(255,184,0,.3)),
    0 0 120px var(--focus-elem-glow, rgba(255,184,0,.15));
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: clamp(6px, 1.2vh, 14px);
  padding: clamp(10px, 2vh, 22px) clamp(8px, 2vw, 20px);
  position: relative;
  flex-shrink: 1;
  min-height: 0;
  animation: focusCardIn .44s cubic-bezier(.34,1.3,.64,1) forwards;
}
@keyframes focusCardIn {
  0%   { transform: scale(.35) translateY(50px); opacity: 0; }
  55%  { opacity: 1; }
  100% { transform: scale(1)   translateY(0);    opacity: 1; }
}
#focus-card-clone.dismiss {
  animation: focusCardOut .3s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes focusCardOut {
  0%   { transform: scale(1)   translateY(0);    opacity: 1; }
  100% { transform: scale(.4)  translateY(30px); opacity: 0; }
}

/* Stripe topo removida — fundo inteiro é a cor do herói */

/* Brilho pulsante nas bordas da carta */
#focus-card-clone::before {
  content: '';
  position: absolute; inset: -2px;
  border-radius: inherit;
  background: transparent;
  box-shadow: 0 0 0 2px var(--focus-elem-color, rgba(255,184,0,.5));
  animation: focusCardGlow 2s ease-in-out infinite;
  pointer-events: none;
  z-index: -1;
}
@keyframes focusCardGlow {
  0%,100% { box-shadow: 0 0 10px 2px var(--focus-elem-glow, rgba(255,184,0,.3)),
                        0 0 40px 4px var(--focus-elem-glow, rgba(255,184,0,.15)); }
  50%     { box-shadow: 0 0 22px 6px var(--focus-elem-glow, rgba(255,184,0,.55)),
                        0 0 80px 12px var(--focus-elem-glow, rgba(255,184,0,.25)); }
}

/* Conteúdo da carta */
.focus-stats  { display:flex; justify-content:space-between; width:88%; flex-shrink:0; }
.focus-atk    { font-family:'Nunito',sans-serif; font-weight:800;
                font-size:clamp(10px,1.6vw,15px); color:rgba(255,255,255,.95);
                background:rgba(0,0,0,.18); padding:2px 6px; border-radius:4px; text-shadow:0 1px 3px rgba(0,0,0,.3); }
.focus-def    { font-family:'Nunito',sans-serif; font-weight:800;
                font-size:clamp(10px,1.6vw,15px); color:rgba(255,255,255,.95);
                background:rgba(0,0,0,.18); padding:2px 6px; border-radius:4px; text-shadow:0 1px 3px rgba(0,0,0,.3); }

.focus-icon {
  flex: 1;
  width: 80%;
  max-width: 260px;
  min-height: 0;
  display: flex; align-items: flex-end; justify-content: center;
  overflow: visible;
}
.focus-icon .hero-img {
  width: 100%; height: 120%;
  object-fit: contain; object-position: center bottom;
  filter:
    drop-shadow(0 6px 28px var(--focus-elem-glow, rgba(255,255,255,.5)))
    drop-shadow(0 2px 8px rgba(0,0,0,.25));
  animation: focusHeroPulse 2.2s ease-in-out infinite;
}
@keyframes focusHeroPulse {
  0%,100% { transform: scale(1)    translateY(0);    }
  40%     { transform: scale(1.07) translateY(-8px); }
  70%     { transform: scale(1.03) translateY(-3px); }
}

.focus-name {
  font-family:'Nunito',sans-serif;
  font-size: clamp(12px, 2vw, 18px);
  font-weight: 900; color: rgba(255,255,255,.95); letter-spacing: .5px; text-shadow: 0 1px 4px rgba(0,0,0,.3);
  flex-shrink: 0;
}
.focus-hearts {
  display:flex; gap:clamp(2px,.4vw,4px); flex-wrap:wrap; justify-content:center;
  flex-shrink: 0;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,.35));
}

/* ── PPR row — na base da tela, botões grandes ── */
#focus-ppr-row {
  display: flex;
  gap: clamp(18px, 5vw, 44px);
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  padding-top: clamp(8px, 1.5vh, 18px);
}

/* ── PPR buttons: image-only, sem fundo nem borda ─────────────────────────
   Desktop (hover: hover): glow via filter no hover
   Mobile  (hover: none) : scale-down no :active
   ────────────────────────────────────────────────────────────────────────── */
.focus-ppr-btn {
  /* Botões grandes — confortáveis num tablet/celular */
  width:  clamp(80px, 15vw, 120px);
  height: clamp(80px, 15vw, 120px);
  border-radius: clamp(14px, 2vw, 22px);
  background: rgba(255,255,255,.75);
  border: 2px solid rgba(26,42,78,.08);
  box-shadow: 0 4px 18px rgba(0,0,0,.1), 0 1px 0 rgba(255,255,255,.8) inset;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 5px;
  padding: clamp(6px, 1.2vw, 12px);
  transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, background .15s;
  opacity: 0;
  transform: scale(.4) translateY(24px);
  animation: focusPillIn .4s cubic-bezier(.34,1.5,.64,1)
    calc(var(--ppr-i,0) * 80ms + 260ms) forwards;
}
@keyframes focusPillIn {
  0%   { opacity:0; transform: scale(.4) translateY(24px); }
  70%  { opacity:1; }
  100% { opacity:1; transform: scale(1) translateY(0); }
}

/* Imagem — grande e com espaço */
.focus-ppr-btn img.ppr-icon {
  width: 78%; height: 78%;
  object-fit: contain;
  pointer-events: none;
  transition: filter .22s ease, transform .18s ease;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,.18));
}

/* Desktop hover */
@media (hover: hover) and (pointer: fine) {
  .focus-ppr-btn:hover {
    transform: translateY(-6px) scale(1.12);
    background: rgba(255,255,255,.95);
    box-shadow: 0 10px 32px rgba(0,0,0,.14), 0 0 28px var(--gold-glow);
  }
  .focus-ppr-btn:hover img.ppr-icon {
    filter:
      drop-shadow(0 0 14px var(--gold))
      drop-shadow(0 0 28px rgba(255,184,0,.5))
      drop-shadow(0 3px 8px rgba(0,0,0,.2));
    transform: scale(1.06);
  }
}

/* Mobile press */
@media (hover: none) {
  .focus-ppr-btn:active {
    transform: scale(.84) !important;
    background: rgba(255,255,255,.95) !important;
    transition: transform .06s ease-out !important;
  }
  .focus-ppr-btn:active img.ppr-icon {
    filter: drop-shadow(0 1px 3px rgba(0,0,0,.3)) brightness(.9);
    transition: filter .06s ease-out;
  }
}

/* Desktop press */
.focus-ppr-btn:active {
  transform: translateY(3px) scale(.90) !important;
  box-shadow: 0 2px 8px rgba(0,0,0,.1) !important;
  transition: transform .06s ease-out !important;
}

/* Chosen */
.focus-ppr-btn.chosen {
  background: rgba(255,220,40,.25);
  border-color: var(--gold);
  box-shadow: 0 6px 0 var(--gold-dk), 0 0 32px var(--gold-glow), 0 8px 24px rgba(0,0,0,.15);
  animation: pillChosenFocus .38s cubic-bezier(.34,1.56,.64,1) forwards;
}
.focus-ppr-btn.chosen img.ppr-icon {
  filter:
    drop-shadow(0 0 16px var(--gold))
    drop-shadow(0 0 32px rgba(255,184,0,.55))
    drop-shadow(0 3px 8px rgba(0,0,0,.2));
}
@keyframes pillChosenFocus {
  0%   { transform: scale(1)    translateY(0);    }
  45%  { transform: scale(1.26) translateY(-10px); }
  100% { transform: scale(1.14) translateY(-5px);  }
}

/* Label */
.focus-ppr-label {
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: clamp(9px, 1.4vw, 13px);
  letter-spacing: .5px;
  color: var(--text);
  line-height: 1;
}

/* Cancel hint — na base, abaixo dos botões PPR */
#focus-cancel-hint {
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: clamp(9px, 1.3vw, 11px);
  color: var(--text-dim);
  letter-spacing: 1px;
  opacity: 0;
  animation: focusPillIn .3s ease calc(520ms) forwards;
  cursor: pointer;
  transition: color .15s;
  margin-top: clamp(4px, 1vh, 10px);
}
#focus-cancel-hint:hover { color: var(--text); }
</style>
</head>

<!-- ① THEME CONFIG -->
<script id="theme-config">
'use strict';
const THEME = Object.freeze({
  // ── Pasta de assets: coloque a pasta "assets/" junto ao HTML na raiz ──────
  // Mapeamento PAW Patrol → papel de cada herói:
  //   Marshall (bombeiro)  → Rex, o Bombeirão   [atk alto]
  //   Zuma    (mergulho)   → Marina, a Mergulhona [def alta]
  //   Rubble  (escavadora) → Guto, o Escavador  [def máxima]
  //   Skye    (avião)      → Asa, o Aviador      [balanceado]
  //   Rocky   (técnico)    → Faísca, o Técnico   [atk máximo]
