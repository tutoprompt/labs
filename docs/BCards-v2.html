<!-- ② ENGINE LAYER -->
<script id="engine-layer">
'use strict';
const ENGINE = (() => {
  const mkDeck   = () => THEME.CARDS.map(d => ({ ...d, hp: d.maxHp }));
  const cdef     = id  => THEME.CARDS.find(c => c.id === id);
  const phpe     = (player, id) => state[player].hp.find(c => c.id === id);
  const totalHp  = player => state[player].hp.reduce((s, c) => s + c.hp, 0);
  const pprBeats = (a, b) => THEME.PPR[a].beats === b;
  const calcDmg  = (atk, def) => Math.max(1, Math.ceil(Math.max(1, atk - def) * 1.30));
  let state = null;

  function init() {
    state = {
      round: 1, phase: 'p1select',
      deck:  mkDeck(),
      p1: { hp: mkDeck().map(d => ({ id:d.id, hp:d.maxHp })), sel:null, ppr:null },
      p2: { hp: mkDeck().map(d => ({ id:d.id, hp:d.maxHp })), sel:null, ppr:null },
      revealed: false,
      pending: { player:null, cardId:null, ppr:null },
    };
  }

  function selectCard(player, cardId) {
    if (!state || state.phase !== `${player}select`) return { ok:false };
    const ph = phpe(player, cardId);
    if (!ph || ph.hp <= 0) return { ok:false };
    state.pending.player = player;
    state.pending.cardId = cardId;
    state.pending.ppr    = null;
    return { ok:true };
  }

  function choosePPR(player, cardId, choice) {
    if (!state) return { ok:false };
    if (state.pending.player !== player || state.pending.cardId !== cardId) return { ok:false };
    if (!THEME.PPR[choice]) return { ok:false };
    state.pending.ppr = choice;
    return { ok:true };
  }

  function confirmTurn(player) {
    const { player:pp, cardId, ppr } = state.pending;
    if (pp !== player || !cardId || !ppr) return { ok:false };
    state[player].sel = cardId;
    state[player].ppr = ppr;
    state.pending = { player:null, cardId:null, ppr:null };
    const nextPhase = player === 'p1' ? 'p2select' : 'reveal';
    state.phase = nextPhase;
    state.revealed = false;
    return { ok:true, nextPhase };
  }

  function resolveRound() {
    const id1=state.p1.sel, id2=state.p2.sel;
    const c1=cdef(id1), c2=cdef(id2);
    const ph1=phpe('p1',id1), ph2=phpe('p2',id2);
    const r1=state.p1.ppr, r2=state.p2.ppr;
    let outcome='tie', dmgTo1=0, dmgTo2=0;
    if (r1===r2)          { dmgTo1=2; dmgTo2=2; }
    else if(pprBeats(r1,r2)){ outcome='p1'; dmgTo2=calcDmg(c1.atk,c2.def); }
    else                  { outcome='p2'; dmgTo1=calcDmg(c2.atk,c1.def); }
    ph1.hp=Math.max(0,ph1.hp-dmgTo1);
    ph2.hp=Math.max(0,ph2.hp-dmgTo2);
    const c1Destroyed=ph1.hp===0, c2Destroyed=ph2.hp===0;
    const p1AllDead=state.p1.hp.every(c=>c.hp<=0);
    const p2AllDead=state.p2.hp.every(c=>c.hp<=0);
    return { outcome, c1, c2, r1, r2, dmgTo1, dmgTo2, c1Destroyed, c2Destroyed, p1AllDead, p2AllDead, gameOver:p1AllDead||p2AllDead };
  }

  function revealCommit(result) {
    state.revealed = true;
    state.phase = result.gameOver ? 'gameover' : 'done';
  }

  function nextRound() {
    state.round++;
    state.phase='p1select';
    state.p1.sel=null; state.p1.ppr=null;
    state.p2.sel=null; state.p2.ppr=null;
    state.revealed=false;
    state.pending={ player:null, cardId:null, ppr:null };
  }

  function restart() { init(); }

  return {
    get state()  { return state; },
    get cdef()   { return cdef; },
    get phpe()   { return phpe; },
    get totalHp(){ return totalHp; },
    init, selectCard, choosePPR, confirmTurn, resolveRound, revealCommit, nextRound, restart,
  };
})();
</script>

<!-- ③ RENDERER LAYER -->
<script id="renderer-layer">
'use strict';
const RENDERER = (() => {
  const labels = { p1: THEME.STRINGS.player1, p2: THEME.STRINGS.player2 };
  const getLabel = p => labels[p];
  const setLabel = (p, v) => { labels[p] = v || THEME.STRINGS[`player${p==='p1'?1:2}`]; };
  const $ = id => document.getElementById(id);

  // ══════════════════════════════════════════════════════════════════════
  // v18 STATE MODEL
  // ──────────────────────────────────────────────────────────────────────
  // Face state lives on EACH CARD as data-face="up|down".
  // The deck-wrap carries data-deck-state="active|inactive|waking" for scale.
  //
  // This eliminates:
  //   • flipLock — DOM can be rebuilt any time; new cards inherit correct state
  //   • deckState object — truth is in the DOM attribute, always readable
  //   • _snapFace / rAF races — each card sets its own attribute immediately
  //   • descendant-selector inheritance bugs — each card is self-contained
  //
  // Public API that UI layer calls:
  //   flipDeck(player, onComplete)   — animate face-down + scale inactive
  //   revealDeck(player, onComplete) — animate face-up   + scale active/waking
  //   render()                       — full rebuild (reads _faceIntent)
  //   renderPlayerGrid(player, id, faceOverride) — rebuilds one deck
  //
  // _faceIntent = { p1: 'up'|'down', p2: 'up'|'down' }
  // This is the only state variable. It's set before render() is called.
  // ══════════════════════════════════════════════════════════════════════

  const _faceIntent = { p1: 'up', p2: 'down' };

  // Track whether a flip animation is in progress (prevents overlapping calls)
  const _animating  = { p1: false, p2: false };


  // ══════════════════════════════════════════════════════════════════════
  // RENDER FUNCTIONS
  // ══════════════════════════════════════════════════════════════════════

  function render() {
    renderDecks();
    renderPlayerHpBars();
    renderPhase();
    updateRoundCounter();
  }

  function updateRoundCounter() {
    const el = $('round-num');
    if (el) el.textContent = ENGINE.state.round;
  }

  function buildHpHearts(hp, maxHp) {
    let h = '';
    for (let i = 0; i < maxHp; i++) {
      const full = i < hp;
      h += `<span class="hp-heart ${full?'full':'empty'}">${full?'❤️':'🖤'}</span>`;
    }
    return h;
  }

  function renderDecks() {
    renderPlayerGrid('p1', 'deck-p1');
    renderPlayerGrid('p2', 'deck-p2');
  }

  // ── renderPlayerGrid ───────────────────────────────────────────────────────
  // Rebuilds a deck from scratch. Each card receives:
  //   data-face="up|down"   — drives the CSS flip
  //   data-flip-i="N"       — drives the stagger delay (via CSS var --flip-i)
  // Since face state is on each card element, rebuild is always safe —
  // no flipLock needed, no rAF, no race condition possible.
  function renderPlayerGrid(player, containerId) {
    // If a flip animation is actively running, skip this rebuild to avoid
    // interrupting mid-animation. The intent is already stored in _faceIntent.
    if (_animating[player]) return;

    const G    = ENGINE.state;
    const grid = $(containerId);
    if (!grid) return;

    const face      = _faceIntent[player];        // 'up' or 'down'
    const isSelect  = G.phase === `${player}select`;
    const pending   = G.pending;

    grid.innerHTML = '';
    // Set deck-wrap scale state
    grid.dataset.deckState = (face === 'up') ? 'active' : 'inactive';

    G.deck.forEach((c, idx) => {
      const div  = document.createElement('div');
      div.className = `card ${c.cls}`;
      div.dataset.id   = c.id;
      div.dataset.face = face;          // v18: face state lives HERE, on each card
      div.style.setProperty('--flip-i', String(idx));
      // Desync idle animations per card — random negative delay within 1 full cycle
      const _durMap = { rex: 2.8, marina: 3.8, guto: 4.4, asa: 3.2, faisca: 2.2 };
      const _dur = _durMap[c.cls] || 3.2;
      div.style.setProperty('--anim-offset', `-${(Math.random() * _dur).toFixed(2)}s`);

      const pHp    = ENGINE.phpe(player, c.id).hp;
      const dead   = pHp <= 0;
      const isUsed = G[player].sel === c.id;

      if (dead)          div.classList.add('dead');
      else if (isUsed)   div.classList.add('used');
      else if (isSelect) {
        div.classList.add('selectable');
        div.addEventListener('click', () => UI.onCardClick(c.id, player));
      } else {
        div.classList.add('disabled');
      }

      const isPending = isSelect && pending.player === player && pending.cardId === c.id;
      if (isPending) {
        div.classList.remove('selectable');
        div.classList.add('selected');
      }

      const heartsHTML = buildHpHearts(pHp, c.maxHp);

      div.innerHTML = `
        <div class="card-glow"></div>
        <div class="card-battle-fx" data-card-id="${c.id}" data-player="${player}"></div>
        <div class="card-back">🐾</div>
        <div class="card-inner">
          <div class="card-stats">
            <span class="cs-atk">⚔${c.atk}</span>
            <span class="cs-def">🛡${c.def}</span>
          </div>
          <div class="card-icon-area"><img src="${c.icon}" class="hero-img" alt="${c.name}" onerror="this.style.display='none';this.parentElement.dataset.fallback='${c.emoji}'"></div>
          <div class="card-name">${c.name}</div>
          <div class="card-hp-hearts">${heartsHTML}</div>
        </div>`;

      grid.appendChild(div);
    });
  }

  function renderPlayerHpBars() {
    const maxTotal = THEME.CARDS.reduce((s, c) => s + c.maxHp, 0);
    ['p1','p2'].forEach(p => {
      const t   = ENGINE.totalHp(p);
      const pct = Math.max(0, t / maxTotal * 100);
      const col = THEME.hpColor(t, maxTotal);
      $(`${p}-php-fill`).style.cssText = `width:${pct}%;background:${col}`;
      $(`${p}-php-num`).textContent     = t;
    });
  }

  function renderPhase() {
    const G = ENGINE.state;

    $('tb-p1').classList.toggle('show', G.phase==='p1select');
    $('tb-p2').classList.toggle('show', G.phase==='p2select');
    $('reveal-focus').classList.toggle('show', G.phase==='reveal');

    renderPlayButton('p1');
    renderPlayButton('p2');
    renderHint('p1');
    renderHint('p2');

    updateRoundCounter();
    syncLabels();

    if (G.phase === 'p1select') applyZoneEmphasis('p1');
    else if (G.phase === 'p2select') applyZoneEmphasis('p2');
    else resetZoneEmphasis();
  }

  function renderPlayButton(p) {
    const btn  = $(`play-btn-${p}`);
    const hint = $(`hint-${p}`);
    if (!btn) return;
    btn.style.display = 'none';
    btn.className = '';
    if (ENGINE.state.phase !== `${p}select`) {
      if (hint) { hint.textContent = ''; hint.className = 'zone-hint'; }
      return;
    }
    if (hint) { hint.textContent = THEME.STRINGS.pickCard; hint.className = 'zone-hint'; }
  }

  function renderHint(p) { /* handled in renderPlayButton */ }

  function syncLabels() {
    const l1=getLabel('p1'), l2=getLabel('p2');
    const d1=$('deck-p1-label'); if(d1) d1.textContent=l1.slice(0,4);
    const d2=$('deck-p2-label'); if(d2) d2.textContent=l2.slice(0,4);
  }

  function showToast(main, sub) {
    $('toast-main').textContent = main;
    $('toast-sub').textContent  = sub;
    $('result-toast').classList.add('show');
  }
  function hideToast() { $('result-toast').classList.remove('show'); }

  function showGameOver(p1Dead, p2Dead, round) {
    const S = THEME.STRINGS;
    let title='', sub='';
    if (p1Dead&&p2Dead) { title=S.gameTitleTie;  sub=S.gameSubBoth; }
    else if (p2Dead)    { title=S.gameTitleP1;   sub=S.gameSubWin(round); }
    else                { title=S.gameTitleP2;   sub=S.gameSubWin(round); }
    $('go-crown').textContent    = S.crownIcon;
    $('go-title').textContent    = title;
    $('go-subtitle').textContent = sub;
    $('gameover-screen').classList.add('show');
  }
  function hideGameOver() { $('gameover-screen').classList.remove('show'); }

  // ══════════════════════════════════════════════════════════════════════
  // FLIP ANIMATION ENGINE — v18
  // ──────────────────────────────────────────────────────────────────────
  // flipDeck(player, onComplete)
  //   Flips all cards face-down with stagger, shrinks deck-wrap.
  //   Cards are already in the DOM. We just change data-face on each.
  //
  // revealDeck(player, onComplete)
  //   Flips all cards face-up with reverse stagger, plays wake animation.
  //
  // Both functions:
  //   1. Set _faceIntent immediately (so any subsequent render() call knows)
  //   2. Set _animating[player]=true to block renderPlayerGrid mid-anim
  //   3. Mutate data-face on existing card elements — CSS reacts instantly
  //   4. After animation duration, clear _animating and call onComplete
  //
  // No class on deck-wrap. No inherited styles. No race conditions.
  // ══════════════════════════════════════════════════════════════════════

  // ── flipDeck — animates deck face-down with opacity stagger ──────────────
  function flipDeck(player, onComplete) {
    const deck = $(`deck-${player}`);
    if (!deck) { if (onComplete) onComplete(); return; }

    _faceIntent[player] = 'down';
    _animating[player]  = true;

    const cards = deck.querySelectorAll('.card');
    const n     = cards.length;

    // Shrink deck-wrap
    deck.dataset.deckState = 'inactive';

    // Stagger each card: set --flip-i then flip data-face
    // CSS transition on .card-inner/.card-back opacity handles the visual
    cards.forEach((c, i) => {
      c.style.setProperty('--flip-i', String(i));
      c.dataset.face = 'down';
    });

    // Duration: flip-dur (460ms) + stagger * (n-1) + buffer
    const total = 460 + (55 * Math.max(0, n - 1)) + 60;
    setTimeout(() => {
      _animating[player] = false;
      if (onComplete) onComplete();
    }, total);
  }

  // ── revealDeck — animates deck face-up with reverse opacity stagger ────────
  function revealDeck(player, onComplete) {
    const deck = $(`deck-${player}`);
    if (!deck) { if (onComplete) onComplete(); return; }

    _faceIntent[player] = 'up';
    _animating[player]  = true;

    const cards = deck.querySelectorAll('.card');
    const n     = cards.length;

    // Wake animation on the wrapper
    deck.dataset.deckState = 'waking';

    // Reverse stagger: last card reveals first
    cards.forEach((c, i) => {
      c.style.setProperty('--flip-i', String(n - 1 - i));
      c.dataset.face = 'up';
    });

    // Duration: flip-dur + reverse stagger + buffer
    const total = 460 + (55 * Math.max(0, n - 1)) + 60;
    setTimeout(() => {
      // Restore normal stagger order for future flips
      cards.forEach((c, i) => c.style.setProperty('--flip-i', String(i)));
      deck.dataset.deckState = 'active';
      _animating[player] = false;
      if (onComplete) onComplete();
    }, total);
  }

  // ── ZONE EMPHASIS ──────────────────────────────────────────────────────────
  function applyZoneEmphasis(activePlayer) {
    const z1 = $('zone-p1');
    const z2 = $('zone-p2');
    if (!z1 || !z2) return;
    z1.classList.remove('zone-turn-active', 'zone-turn-inactive');
    z2.classList.remove('zone-turn-active', 'zone-turn-inactive');
    if (!activePlayer) return;
    if (activePlayer === 'p1') {
      z1.classList.add('zone-turn-active');
      z2.classList.add('zone-turn-inactive');
    } else {
      z2.classList.add('zone-turn-active');
      z1.classList.add('zone-turn-inactive');
    }
  }

  function resetZoneEmphasis() { applyZoneEmphasis(null); }

  return {
    render, renderDecks, renderPhase, renderPlayerHpBars,
    renderPlayerGrid,
    showToast, hideToast, showGameOver, hideGameOver,
    syncLabels,
    flipDeck, revealDeck,
    applyZoneEmphasis, resetZoneEmphasis,
    getLabel, setLabel, updateRoundCounter,
    renderPlayButton,
    // Expose _faceIntent so UI layer can set desired state before render()
    get faceIntent() { return _faceIntent; },
  };
})();
</script>

<!-- ③½ BATTLE_FX MODULE -->
<script id="battle-fx-module">
'use strict';
const BATTLE_FX = (() => {

  function findCard(player, cardId) {
    const grid = document.getElementById(`deck-${player}`);
    if (!grid) return null;
    return grid.querySelector(`.card[data-id="${cardId}"]`);
  }

  function fxLayer(player, cardId) {
    const card = findCard(player, cardId);
    return card ? card.querySelector('.card-battle-fx') : null;
  }

  function pulse(el, cls, duration) {
    if (!el) return;
    el.classList.remove(cls);
    void el.offsetWidth;
    el.classList.add(cls);
    setTimeout(() => el.classList.remove(cls), duration);
  }

  function spawnNumber(player, cardId, text, color, big = false) {
    const card = findCard(player, cardId);
    if (!card) return;
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;
    const el = document.createElement('div');
    el.className = 'dmg-particle' + (big ? ' dmg-big' : '');
    el.textContent = text;
    el.style.color = color;
    el.style.left  = `${cx}px`;
    el.style.top   = `${cy}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
    if (big || text.startsWith('−')) {
      const count = big ? 8 : 6;
      for (let i = 0; i < count; i++) {
        const angle = (360 / count) * i + Math.random() * 20;
        const dist  = 28 + Math.random() * 24;
        const dx = Math.cos(angle * Math.PI/180) * dist;
        const dy = Math.sin(angle * Math.PI/180) * dist;
        const dot = document.createElement('div');
        dot.className = 'burst-dot';
        dot.style.cssText = `left:${cx}px;top:${cy}px;background:${color};--dx:${dx.toFixed(1)}px;--dy:${dy.toFixed(1)}px;width:${4+Math.random()*4}px;height:${4+Math.random()*4}px;animation-delay:${Math.random()*60}ms;`;
        document.body.appendChild(dot);
        setTimeout(() => dot.remove(), 800);
      }
    }
  }

  function strike(player, cardId) {
    const card = findCard(player, cardId);
    if (!card) return;
    const strikeCls = player === 'p1' ? 'fx-strike-p1' : 'fx-strike-p2';
    pulse(card, strikeCls, 580);
    const fx = fxLayer(player, cardId);
    pulse(card, 'fx-attacker', 580);
    pulse(fx,   'fx-attack',   500);
  }

  function damage(player, cardId, amount) {
    const card = findCard(player, cardId);
    const fx   = fxLayer(player, cardId);
    pulse(card, 'fx-damage',     530);
    pulse(fx,   'fx-damage-hit', 470);
    pulse(fx,   'fx-shockwave',  520);
    const big = amount >= 4;
    if (amount > 0) spawnNumber(player, cardId, `−${amount} 💥`, '#ff3838', big);
  }

  function attack(player, cardId) {
    const card = findCard(player, cardId);
    const fx   = fxLayer(player, cardId);
    pulse(card, 'fx-attacker', 520);
    pulse(fx,   'fx-attack',   520);
  }

  function tie(player, cardId) {
    const card = findCard(player, cardId);
    pulse(card, 'fx-tie', 650);
    spawnNumber(player, cardId, '🤝 IGUAIS!', '#c0a060', false);
  }

  function win(player, cardId) {
    const card = findCard(player, cardId);
    const fx   = fxLayer(player, cardId);
    pulse(card, 'fx-attacker', 800);
    pulse(fx,   'fx-win-beam', 1200);
    spawnNumber(player, cardId, '🌟 RESGATE!', '#f5d800', false);
  }

  function destroyed(player, cardId) {
    const card = findCard(player, cardId);
    if (!card) return;
    pulse(card, 'fx-destroyed', 720);
    spawnNumber(player, cardId, '😴', '#888', false);
  }

  /* Expanded reveal timeline — slower, more cinematic:
     T+0    : decks unflip (reveal)
     T+600  : attacker strikes
     T+1000 : impact — defender shakes + number burst
     T+1300 : win beam
     T+1700 : destroyed
  */
  function resolveResult(result) {
    const { outcome, c1, c2, dmgTo1, dmgTo2, c1Destroyed, c2Destroyed } = result;

    if (outcome === 'p1') {
      setTimeout(() => strike('p1', c1.id), 600);
      setTimeout(() => damage('p2', c2.id, dmgTo2), 1000);
      setTimeout(() => win('p1', c1.id), 1300);
    } else if (outcome === 'p2') {
      setTimeout(() => strike('p2', c2.id), 600);
      setTimeout(() => damage('p1', c1.id, dmgTo1), 1000);
      setTimeout(() => win('p2', c2.id), 1300);
    } else {
      setTimeout(() => { strike('p1', c1.id); strike('p2', c2.id); }, 600);
      setTimeout(() => { tie('p1', c1.id); tie('p2', c2.id); }, 900);
      if (dmgTo1 > 0) setTimeout(() => damage('p1', c1.id, dmgTo1), 1100);
      if (dmgTo2 > 0) setTimeout(() => damage('p2', c2.id, dmgTo2), 1100);
    }
    if (c1Destroyed) setTimeout(() => destroyed('p1', c1.id), 1700);
    if (c2Destroyed) setTimeout(() => destroyed('p2', c2.id), 1700);
  }

  return { strike, attack, damage, tie, win, destroyed, resolveResult };
})();
</script>

<!-- TOAST CTRL — controle de duração do result toast -->
<script id="toast-ctrl-module">
'use strict';
const TOAST_CTRL = (() => {
  let durSec   = 2;
  let _hideTimer   = null;
  let _nextTimer   = null;

  function setDur(sec) {
    durSec = sec;
  }

  function show(main, sub, onDone) {
    clearTimeout(_hideTimer);
    clearTimeout(_nextTimer);

    const elMain = document.getElementById('toast-main');
    const elSub  = document.getElementById('toast-sub');
    const bar    = document.getElementById('toast-progress-bar');
    const toast  = document.getElementById('result-toast');

    if (elMain) elMain.textContent = main;
    if (elSub)  elSub.textContent  = sub;

    // Reset instantâneo da barra
    if (bar) {
      bar.classList.remove('draining');
      bar.style.transition = 'none';
      bar.style.transform  = 'scaleX(1)';
    }

    toast.classList.add('show');

    // Dois rAF garantem que o reset foi pintado antes de iniciar o dreno
    requestAnimationFrame(() => requestAnimationFrame(() => {
      if (bar) {
        bar.classList.add('draining');
        bar.style.transition = `transform ${durSec}s linear`;
        bar.style.transform  = 'scaleX(0)';
      }
    }));

    _hideTimer = setTimeout(() => {
      toast.classList.remove('show');
      if (onDone) _nextTimer = setTimeout(onDone, 420);
    }, durSec * 1000);
  }

  function hide() {
    clearTimeout(_hideTimer);
    clearTimeout(_nextTimer);
    const bar   = document.getElementById('toast-progress-bar');
    const toast = document.getElementById('result-toast');
    if (bar) { bar.classList.remove('draining'); bar.style.transition='none'; bar.style.transform='scaleX(1)'; }
    if (toast) toast.classList.remove('show');
  }

  return { setDur, show, hide, getDur: () => durSec };
})();
</script>

<!-- ④ UI LAYER -->
<script id="ui-layer">
'use strict';
const UI = (() => {

  // ── Card Focus Overlay State ─────────────────────────────────────────────
  let _focusPlayer = null;
  let _focusCardId = null;
  let _focusDismissing = false;

  function _buildFocusClone(cardDef, playerHp) {
    const clone = document.getElementById('focus-card-clone');
    // Apply element token CSS variables
    const clsMap = {
      //                  bg sólido escuro               cor do brilho          glow
      rex:    { solid:'linear-gradient(160deg,#8b1a0a,#c0392b)', color:'var(--rex)',    glow:'var(--rex-glow)'    },
      marina: { solid:'linear-gradient(160deg,#0a3a7a,#1565c0)', color:'var(--marina)', glow:'var(--marina-glow)' },
      guto:   { solid:'linear-gradient(160deg,#7a5200,#b07800)', color:'var(--guto)',   glow:'var(--guto-glow)'   },
      asa:    { solid:'linear-gradient(160deg,#7a3000,#b85500)', color:'var(--asa)',    glow:'var(--asa-glow)'    },
      faisca: { solid:'linear-gradient(160deg,#0d5c22,#178a30)', color:'var(--faisca)', glow:'var(--faisca-glow)' },
    };
    const tk = clsMap[cardDef.cls] || clsMap.marina;
    clone.style.setProperty('--focus-bg-solid',    tk.solid);
    clone.style.setProperty('--focus-elem-color',  tk.color);
    clone.style.setProperty('--focus-elem-glow',   tk.glow);

    // Build hearts
    let hearts = '';
    for (let i = 0; i < cardDef.maxHp; i++) {
      hearts += `<span style="font-size:clamp(7px,.95vw,9px);opacity:${i < playerHp ? '.9' : '.14'}">${i < playerHp ? '❤️' : '🖤'}</span>`;
    }

    clone.innerHTML = `
      <div class="focus-stats">
        <span class="focus-atk">⚔${cardDef.atk}</span>
        <span class="focus-def">🛡${cardDef.def}</span>
      </div>
      <div class="focus-icon"><img src="${cardDef.icon}" class="hero-img" alt="${cardDef.name}" onerror="this.style.display='none';this.parentElement.dataset.fallback='${cardDef.emoji}'"></div>
      <div class="focus-name">${cardDef.name}</div>
      <div class="focus-hearts">${hearts}</div>`;

    // Reset animation
    clone.classList.remove('dismiss');
    void clone.offsetWidth;
  }

  function _buildFocusPPR(cardId, player, currentPPR) {
    const row = document.getElementById('focus-ppr-row');
    row.innerHTML = Object.entries(THEME.PPR).map(([key, ppr], i) => {
      const chosen = currentPPR === key ? 'chosen' : '';
      const iconContent = ppr.iconImg
        ? `<img class="ppr-icon" src="${ppr.iconImg}" alt="${ppr.label}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='block'"
           ><span style="display:none;font-size:clamp(22px,4vw,34px)">${ppr.icon}</span>`
        : ppr.icon;
      return `<button class="focus-ppr-btn ${chosen}"
        style="--ppr-i:${i}"
        onclick="UI.onFocusPPR('${key}','${cardId}','${player}')"
        title="${ppr.label}">
          ${iconContent}
          <span class="focus-ppr-label">${ppr.label}</span>
        </button>`;
    }).join('');
  }

  // ── openFocus ─────────────────────────────────────────────────────────────
  // Called when a player clicks a card in the deck.
  // Launches the full-screen focus overlay with the card + PPR options.
  function openFocus(cardId, player) {
    const res = ENGINE.selectCard(player, cardId);
    if (!res.ok) return;

    _focusPlayer = player;
    _focusCardId = cardId;
    _focusDismissing = false;

    const cardDef  = ENGINE.cdef(cardId);
    const playerHp = ENGINE.phpe(player, cardId).hp;
    const pending  = ENGINE.state.pending;

    _buildFocusClone(cardDef, playerHp);
    _buildFocusPPR(cardId, player, pending.ppr);

    // Reset cancel hint animation
    const hint = document.getElementById('focus-cancel-hint');
    hint.style.opacity = '0';
    hint.style.animation = 'none';
    void hint.offsetWidth;
    hint.style.animation = '';

    document.getElementById('card-focus-overlay').classList.add('show');
  }

  // ── onFocusPPR ────────────────────────────────────────────────────────────
  // Player clicks a PPR pill inside the focus overlay.
  function onFocusPPR(choice, cardId, player) {
    const res = ENGINE.choosePPR(player, cardId, choice);
    if (!res.ok) return;

    // Mark chosen pill visually
    const row = document.getElementById('focus-ppr-row');
    row.querySelectorAll('.focus-ppr-btn').forEach(btn => btn.classList.remove('chosen'));
    const chosen = row.querySelector(`[onclick*="'${choice}'"]`);
    if (chosen) chosen.classList.add('chosen');

    // Brief pause then auto-confirm
    setTimeout(() => _confirmFocus(player), 280);
  }

  // ── _confirmFocus ─────────────────────────────────────────────────────────
  // Dismisses the focus overlay, flips card back, triggers confirm flow.
  function _confirmFocus(player) {
    if (_focusDismissing) return;
    _focusDismissing = true;

    const clone = document.getElementById('focus-card-clone');
    clone.classList.add('dismiss');

    const overlay = document.getElementById('card-focus-overlay');
    overlay.style.transition = 'opacity .3s ease .12s';
    overlay.classList.remove('show');

    // After dismiss animation, run onConfirm which handles deck flip
    setTimeout(() => {
      overlay.style.transition = '';
      _focusPlayer = null;
      _focusCardId = null;
      _focusDismissing = false;
      onConfirm(player);
    }, 420);
  }

  // ── onFocusCancel ─────────────────────────────────────────────────────────
  function onFocusCancel() {
    if (_focusDismissing) return;

    // Reset engine pending selection
    if (_focusPlayer) {
      ENGINE.state.pending.player  = null;
      ENGINE.state.pending.cardId  = null;
      ENGINE.state.pending.ppr     = null;
    }
    _focusPlayer = null;
    _focusCardId = null;
    _focusDismissing = false;

    const overlay = document.getElementById('card-focus-overlay');
    overlay.classList.remove('show');

    // Re-render so the card goes back to selectable state
    RENDERER.renderPlayerGrid(ENGINE.state.phase === 'p1select' ? 'p1' : 'p2',
      `deck-${ENGINE.state.phase === 'p1select' ? 'p1' : 'p2'}`);
  }

  // ── onCardClick ───────────────────────────────────────────────────────────
  // v16: opens the focus overlay instead of inline PPR
  function onCardClick(cardId, player) {
    // If focus is already open for same card, ignore
    if (_focusPlayer === player && _focusCardId === cardId) return;
    openFocus(cardId, player);
  }

  // ── onPPRClick (legacy fallback, now unused) ──────────────────────────────
  function onPPRClick(e, choice, cardId, player) {
    e.stopPropagation();
    const res = ENGINE.choosePPR(player, cardId, choice);
    if (!res.ok) return;
    RENDERER.renderPlayerGrid(player, `deck-${player}`);
    RENDERER.renderPlayButton(player);
  }

  // ── onConfirm ──────────────────────────────────────────────────────────────
  // Turn flow:
  //   P1 confirms → flip P1 deck down → then reveal P2 deck up → render P2 turn
  //   P2 confirms → flip P2 deck down → go to reveal phase
  function onConfirm(player) {
    const res = ENGINE.confirmTurn(player);
    if (!res.ok) return;

    if (res.nextPhase === 'p2select') {
      // ── P1 just finished ──
      // Step 1: flip P1's deck face-down with animation
      RENDERER.flipDeck('p1', () => {
        // Step 2: after P1 flip done, reveal P2's deck with animation
        RENDERER.revealDeck('p2', () => {
          // Step 3: after P2 reveal done, render the full P2 turn UI
          RENDERER.render();
          RENDERER.applyZoneEmphasis('p2');
        });
      });
    } else {
      // ── P2 just finished → reveal phase ──
      RENDERER.flipDeck('p2', () => {
        RENDERER.render(); // renders reveal overlay (phase === 'reveal')
      });
    }
  }

  // ── onReveal ───────────────────────────────────────────────────────────────
  function onReveal() {
    const result = ENGINE.resolveRound();

    // 1) Fade out overlay
    const rf = document.getElementById('reveal-focus');
    rf.classList.remove('show');
    rf.classList.add('hiding');

    // 2) Reveal both decks simultaneously (dramatic unflip)
    RENDERER.revealDeck('p1');
    RENDERER.revealDeck('p2');

    // 3) Battle FX fire after both decks are face-up (~600ms)
    setTimeout(() => {
      BATTLE_FX.resolveResult(result);
    }, 500);

    // 4) Commit result state — but do NOT call renderDecks here (would kill animation)
    setTimeout(() => {
      rf.classList.remove('hiding');
      ENGINE.revealCommit(result);
      // Only update HP hearts on existing card elements, don't rebuild DOM
      _updateCardHpHearts('p1');
      _updateCardHpHearts('p2');
    }, 600);

    // 5) HP bars update
    setTimeout(() => {
      RENDERER.renderPlayerHpBars();
    }, 1200);

    // 6) Toast
    setTimeout(() => {
      RENDERER.renderPhase();
      const S=THEME.STRINGS, p1=result.c1, p2=result.c2;
      const pprP1=THEME.PPR[result.r1], pprP2=THEME.PPR[result.r2];
      let main='', sub='';
      if (result.outcome==='tie') {
        main=`🤝 ${S.roundTie} ${pprP1.icon} vs ${pprP2.icon}`;
        sub=`Cada herói perde 2 de vida`;
      } else if (result.outcome==='p1') {
        main=`🔴 ${S.roundWinP1} ${pprP1.icon} derrota ${pprP2.icon}`;
        sub=`${p1.name} causou ${result.dmgTo2} 💥 de dano!`;
      } else {
        main=`🔵 ${S.roundWinP2} ${pprP2.icon} derrota ${pprP1.icon}`;
        sub=`${p2.name} causou ${result.dmgTo1} 💥 de dano!`;
      }
      if (result.c1Destroyed) sub += ` 😴 ${p1.name} foi descansar!`;
      if (result.c2Destroyed) sub += ` 😴 ${p2.name} foi descansar!`;

      // 7) Usa TOAST_CTRL.show() — duração e barra de progresso configuráveis.
      //    O callback onDone dispara automaticamente ao fim da duração escolhida.
      if (result.gameOver) {
        // Em game over, mostra o toast e depois exibe a tela de resultado
        TOAST_CTRL.show(main, sub, () => {
          RENDERER.showGameOver(result.p1AllDead, result.p2AllDead, ENGINE.state.round);
        });
      } else {
        TOAST_CTRL.show(main, sub, () => {
          ENGINE.nextRound();
          RENDERER.faceIntent.p1 = 'up';
          RENDERER.faceIntent.p2 = 'down';
          RENDERER.render();
        });
      }
    }, 1800);
  }

  // ── Helper: update HP hearts in-place without rebuilding cards ──────────────
  function _updateCardHpHearts(player) {
    const grid = document.getElementById(`deck-${player}`);
    if (!grid) return;
    grid.querySelectorAll('.card').forEach(cardEl => {
      const cardId = cardEl.dataset.id;
      const ph = ENGINE.phpe(player, cardId);
      if (!ph) return;
      const template = THEME.CARDS.find(c => c.id === cardId);
      if (!template) return;
      const heartsEl = cardEl.querySelector('.card-hp-hearts');
      if (!heartsEl) return;
      let h = '';
      for (let i = 0; i < template.maxHp; i++) {
        const full = i < ph.hp;
        h += `<span class="hp-heart ${full?'full':'empty'}">${full?'❤️':'🖤'}</span>`;
      }
      heartsEl.innerHTML = h;
      if (ph.hp <= 0) {
        cardEl.classList.add('dead');
        cardEl.classList.remove('used', 'selectable', 'selected');
      }
    });
  }

  function onRestart() {
    RENDERER.hideGameOver();
    TOAST_CTRL.hide();
    RENDERER.resetZoneEmphasis();
    document.getElementById('card-focus-overlay').classList.remove('show');
    ENGINE.restart();
    RENDERER.faceIntent.p1 = 'up';
    RENDERER.faceIntent.p2 = 'down';
    RENDERER.render();
  }

  return { onCardClick, onPPRClick, onConfirm, onReveal, onRestart, onFocusPPR, onFocusCancel, openFocus };
})();
</script>

ENGINE.init();
