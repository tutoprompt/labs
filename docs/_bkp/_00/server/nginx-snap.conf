# ══════════════════════════════════════════════════════════════
# Nginx — bloco para o snap-service do Labs Portfolio
# 
# ONDE COLAR: dentro do server {} block do seu site existente
# (ou em /etc/nginx/sites-available/snap se quiser isolado)
# ══════════════════════════════════════════════════════════════

# Serve as imagens de screenshot diretamente (sem passar pelo Node)
# URL pública: http://IP_DO_VPS/screenshots/soul-gradient.jpg
location /screenshots/ {
    alias /var/www/folio-screenshots/;
    expires 5m;                          # browser revalida a cada 5 min
    add_header Cache-Control "public, max-age=300";
    add_header Access-Control-Allow-Origin "*";   # CORS aberto — GitHub Pages precisa
    add_header X-Robots-Tag "noindex";            # não indexar imagens do VPS
    try_files $uri =404;
}

# Proxy para o snap-service Node.js
# URL: http://IP_DO_VPS/snap?token=SEU_TOKEN
location /snap {
    proxy_pass         http://127.0.0.1:3099;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_read_timeout 120s;             # Puppeteer pode demorar
    proxy_connect_timeout 10s;
    # segurança mínima: só aceita do próprio servidor ou IPs seus
    # allow 127.0.0.1;
    # allow SEU_IP_AQUI;
    # deny all;
}


