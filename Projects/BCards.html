<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Elementos</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{height:100dvh;overflow:hidden;background:#07090e;font-family:'Cinzel',serif;color:#e8dcc8;display:flex;flex-direction:column;max-width:430px;margin:0 auto;user-select:none;-webkit-user-select:none;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 45% at 50% -5%,rgba(35,16,70,.85),transparent 55%),linear-gradient(180deg,#07090e,#080d1a);}
#bg-el{position:fixed;inset:0;z-index:0;pointer-events:none;transition:background 1.5s ease;}
.spark{position:fixed;z-index:1;pointer-events:none;border-radius:50%;animation:spkRise linear infinite;opacity:0;}
@keyframes spkRise{0%{transform:translateY(105dvh) translateX(0) scale(0);opacity:0;}7%{opacity:.8;}82%{opacity:.22;}100%{transform:translateY(-30px) translateX(var(--sx,0)) scale(1.4);opacity:0;}}
#hud{flex:0 0 auto;z-index:20;position:relative;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:clamp(6px,1.3dvh,11px) 12px clamp(3px,.7dvh,5px);}
.pb{display:flex;flex-direction:column;gap:2px;}.pb.r{align-items:flex-end;}
.pname{font-size:7px;letter-spacing:3px;text-transform:uppercase;font-weight:700;opacity:.4;}.pname.c1{color:#7ecfff;}.pname.c2{color:#ff8080;}
.pbar{width:clamp(70px,16vw,100px);height:4px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;position:relative;}
.pbfill{height:100%;border-radius:99px;transition:width .7s ease;position:relative;}.pbfill::after{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:rgba(255,255,255,.3);border-radius:99px;}
.pbfill.c1{background:linear-gradient(90deg,#1a5a8a,#7ecfff);}.pbfill.c2{background:linear-gradient(270deg,#8a1a1a,#ff8080);}
.pcards{font-size:7.5px;font-weight:700;opacity:.5;letter-spacing:.3px;}
#hud-mid{display:flex;flex-direction:column;align-items:center;gap:0;}
#rd-lbl{font-size:6px;letter-spacing:3px;text-transform:uppercase;color:#c8a84a;opacity:.5;}
#rd-n{font-family:'Cinzel Decorative',serif;font-size:clamp(20px,4.5dvh,30px);line-height:1;color:#c8a84a;text-shadow:0 2px 0 #7a5800,0 0 20px rgba(200,168,74,.45);}
#rd-res{font-size:6.5px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(200,168,74,.55);min-height:9px;text-align:center;font-family:'IM Fell English',serif;font-style:italic;}
#game{flex:1;min-height:0;display:flex;flex-direction:column;position:relative;z-index:5;}
#arena-zone{flex:0 0 52%;display:flex;flex-direction:column;padding:3px 10px 4px;position:relative;}
#phase-bar{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#c8a84a;opacity:.6;text-align:center;font-family:'IM Fell English',serif;font-style:italic;min-height:13px;margin-bottom:3px;}
#arena{flex:1;min-height:0;position:relative;display:grid;grid-template-columns:1fr 28px 1fr;align-items:stretch;background:radial-gradient(ellipse 90% 75% at 50% 50%,rgba(255,255,255,.018),transparent 72%),linear-gradient(180deg,rgba(12,16,28,.97),rgba(6,8,14,.98));border:1.5px solid rgba(200,168,74,.12);border-radius:20px;box-shadow:inset 0 0 48px rgba(0,0,0,.75),0 4px 24px rgba(0,0,0,.6);overflow:hidden;padding:6px;}
#arena::before{content:'';position:absolute;left:50%;top:8%;bottom:8%;width:1px;background:repeating-linear-gradient(180deg,rgba(200,168,74,.2) 0,rgba(200,168,74,.2) 5px,transparent 5px,transparent 11px);transform:translateX(-50%);pointer-events:none;}
#arena-vs{display:flex;align-items:center;justify-content:center;z-index:2;}
#arena-vs span{font-family:'Cinzel Decorative',serif;font-size:9px;color:#c8a84a;text-shadow:0 0 12px rgba(200,168,74,.55);width:24px;height:24px;border-radius:50%;background:rgba(6,8,14,.9);border:1px solid rgba(200,168,74,.2);display:flex;align-items:center;justify-content:center;}
#arena-flash{position:absolute;inset:0;z-index:25;pointer-events:none;border-radius:20px;opacity:0;background:radial-gradient(ellipse at 50% 50%,rgba(255,255,255,.22),transparent 58%);}
@keyframes arenaImpact{0%{opacity:0}15%{opacity:1}100%{opacity:0}}
.dz{border-radius:13px;border:1.5px dashed rgba(255,255,255,.09);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative;overflow:hidden;transition:border-color .3s,background .3s,box-shadow .3s;}
.dz.lit{border-color:rgba(200,168,74,.5);background:rgba(200,168,74,.04);animation:dzPulse 1.2s ease-in-out infinite;}
@keyframes dzPulse{0%,100%{box-shadow:inset 0 0 14px rgba(200,168,74,.05);}50%{box-shadow:inset 0 0 26px rgba(200,168,74,.11),0 0 18px rgba(200,168,74,.08);}}
.dz.filled{border-style:solid;border-width:1px;}
.dz-lbl{font-size:7px;letter-spacing:2px;text-transform:uppercase;opacity:.4;position:absolute;top:4px;left:6px;font-weight:700;}
.dz-icon{font-size:16px;opacity:.1;}.dz-hint{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.16);}
.arena-card{position:absolute;inset:0;border-radius:12px;overflow:hidden;border:1.5px solid rgba(200,168,74,.22);display:flex;flex-direction:column;transition:transform .4s cubic-bezier(.34,1.3,.64,1),filter .4s,box-shadow .4s;}
.arena-card.winner{border-color:rgba(200,168,74,.78)!important;box-shadow:0 0 0 2px rgba(200,168,74,.4),0 0 28px rgba(200,168,74,.22)!important;transform:scale(1.05) translateY(-5px)!important;animation:winPulse 1.5s ease-in-out infinite;}
@keyframes winPulse{0%,100%{box-shadow:0 0 0 2px rgba(200,168,74,.4),0 0 28px rgba(200,168,74,.2);}50%{box-shadow:0 0 0 3px rgba(200,168,74,.65),0 0 44px rgba(200,168,74,.35);}}
.arena-card.loser{filter:saturate(.1) brightness(.38)!important;transform:scale(.9)!important;}
.arena-card.draw{border-color:rgba(255,255,255,.2)!important;}
@keyframes smashFwd{0%{transform:scale(1.05) translateY(-5px);}22%{transform:scale(1.13) translate(var(--sdx,44px),-5px) rotate(var(--sdr,4deg));}50%{transform:scale(1.07) translate(calc(var(--sdx,44px)*.25),-5px);}100%{transform:scale(1.05) translateY(-5px);}}
.arena-card.smashing{animation:smashFwd .5s cubic-bezier(.34,1.2,.64,1) forwards !important;}
@keyframes hitShake{0%,100%{transform:scale(.9);}18%{transform:scale(.9) translateX(-8px) rotate(-2.5deg);}40%{transform:scale(.9) translateX(6px) rotate(1.8deg);}62%{transform:scale(.9) translateX(-4px);}82%{transform:scale(.9) translateX(2px);}}
.arena-card.hit-shake{animation:hitShake .4s ease both !important;}
@keyframes acDie{0%{opacity:1;transform:scale(1);}30%{transform:scale(1.18) rotate(-6deg);}100%{transform:translateY(-110dvh) rotate(-32deg) scale(.2);opacity:0;}}
.ac-art{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.ac-art-bg{position:absolute;inset:0;}.ac-art-sh{position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent);pointer-events:none;}
.ac-art-em{position:relative;z-index:2;font-size:clamp(18px,4dvh,28px);filter:drop-shadow(0 2px 10px rgba(0,0,0,.9));}
.ac-art-nm{position:absolute;bottom:0;left:0;right:0;z-index:3;background:linear-gradient(0deg,rgba(0,0,0,.8),transparent);padding:4px 5px 3px;font-size:clamp(6px,1.3vw,8px);font-weight:700;letter-spacing:.5px;text-transform:uppercase;text-align:center;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,1);}
.ac-foot{flex:0 0 auto;background:rgba(0,0,0,.78);padding:3px 5px;display:flex;flex-direction:column;gap:2px;}
.ac-stats{display:flex;gap:2px;}
.acst{flex:1;background:rgba(0,0,0,.4);border-radius:3px;border:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;padding:1px 2px;}
.acst-l{font-size:4px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3);}.acst-v{font-size:clamp(8px,1.9vw,11px);font-weight:800;line-height:1;}
.acst.a .acst-v{color:#f4a0a0;}.acst.d .acst-v{color:#90c0f4;}
.ac-ebar{height:4px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;}
.ac-efill{height:100%;border-radius:99px;}
.ac-badge{position:absolute;top:4px;right:4px;z-index:10;font-size:7px;font-weight:700;letter-spacing:.5px;border-radius:20px;padding:2px 6px;animation:popIn .28s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{opacity:0;transform:scale(.2) translateY(-4px)}to{opacity:1;transform:none}}
.ab-win{background:rgba(200,168,74,.92);color:#1a1000;}.ab-lose{background:rgba(190,40,40,.9);color:#fff;}.ab-draw{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12);}
#rev-btn{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:12;font-family:'Cinzel',serif;font-size:clamp(10px,2.2dvh,14px);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:10px;padding:clamp(8px,1.8dvh,12px) clamp(22px,6vw,36px);cursor:pointer;overflow:hidden;background:linear-gradient(160deg,#a08012,#5c4800);color:#f4e090;text-shadow:0 1px 4px rgba(0,0,0,.7);box-shadow:0 4px 0 rgba(0,0,0,.55),0 0 22px rgba(200,168,74,.28);transition:transform .1s,box-shadow .1s,opacity .3s;opacity:0;pointer-events:none;white-space:nowrap;}
#rev-btn.ready{opacity:1;pointer-events:auto;}
#rev-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.16),transparent 55%);pointer-events:none;}
#rev-btn:active{transform:translateX(-50%) translateY(3px)!important;box-shadow:0 1px 0 rgba(0,0,0,.55)!important;}
#hand-zone{flex:0 0 48%;display:flex;flex-direction:column;padding:3px 7px clamp(5px,1.2dvh,9px);}
.hand-rows{flex:1;display:flex;flex-direction:column;justify-content:flex-end;}
.hand-row{display:flex;gap:clamp(4px,1.2vw,7px);justify-content:center;align-items:flex-end;}
.hand-row.top{padding:0 clamp(14px,6.5vw,44px);margin-bottom:clamp(3px,.9dvh,5px);}
.hcard{position:relative;width:clamp(74px,17.5vw,100px);aspect-ratio:63/88;flex:0 0 auto;border-radius:9px;cursor:grab;touch-action:none;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .18s,filter .15s;will-change:transform;}
.hcard:active{transform:scale(.9) translateY(3px)!important;}.hcard.dragging{opacity:.22;cursor:grabbing;}.hcard.dead{opacity:.12;pointer-events:none;filter:grayscale(1);}
.hcard.prev-winner .cf-frame{border-color:rgba(200,168,74,.62)!important;box-shadow:0 0 0 1px rgba(0,0,0,.9),0 5px 14px rgba(0,0,0,.8),0 0 18px rgba(200,168,74,.28)!important;}
.hcard.prev-winner::after{content:'⚔';position:absolute;top:-7px;right:-4px;z-index:30;font-size:11px;filter:drop-shadow(0 0 6px rgba(200,168,74,.8));animation:swBob 1.6s ease-in-out infinite;}
@keyframes swBob{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg) translateY(-3px)}}
.hcard.dying{animation:cardDie .58s cubic-bezier(.4,0,1,1) forwards;pointer-events:none;}
@keyframes cardDie{0%{transform:scale(1);opacity:1;}28%{transform:scale(1.14) rotate(-5deg);}100%{transform:translateY(-115dvh) rotate(-28deg) scale(.25);opacity:0;}}
.cf-frame{position:absolute;inset:0;border-radius:9px;overflow:hidden;border:2px solid var(--cborder,rgba(200,168,74,.5));box-shadow:0 0 0 1px rgba(0,0,0,.9),0 6px 18px rgba(0,0,0,.85),inset 0 0 0 1px rgba(255,255,255,.05),0 0 26px var(--cglow,transparent);}
.cf-frame::before{content:'';position:absolute;inset:3px;border-radius:6px;border:1px solid rgba(255,255,255,.09);z-index:2;pointer-events:none;}
.cf-vitral{position:absolute;inset:0;background:var(--cvitral);}
.cf-shine{position:absolute;top:0;left:0;right:0;height:34%;background:linear-gradient(180deg,rgba(255,255,255,.22),transparent);border-radius:7px 7px 0 0;pointer-events:none;z-index:6;}
.cf-hdr{position:absolute;top:5px;left:6px;right:6px;z-index:8;display:flex;justify-content:space-between;align-items:flex-start;}
.cf-hname{font-family:'Cinzel',serif;font-size:clamp(4.5px,.95vw,6.5px);font-weight:700;letter-spacing:.3px;color:#fff;max-width:68%;text-shadow:0 0 8px rgba(0,0,0,1),0 1px 3px rgba(0,0,0,1);}
.cf-hem{font-size:clamp(7.5px,1.7vw,10px);filter:drop-shadow(0 0 4px rgba(0,0,0,.9));line-height:1;}
.cf-portrait{position:absolute;top:19px;left:5px;right:5px;height:40%;border-radius:4px;overflow:hidden;z-index:4;background:var(--cvitral);box-shadow:inset 0 0 10px rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.09);}
.cf-port-bg{position:absolute;inset:0;background:var(--cportrait);}
.cf-port-rays{position:absolute;inset:0;opacity:.14;mix-blend-mode:overlay;background:repeating-conic-gradient(from 0deg at 50% 65%,var(--cray1,transparent) 0deg 10deg,transparent 10deg 20deg);}
.cf-port-em{position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;font-size:clamp(19px,4.8dvh,29px);filter:drop-shadow(0 2px 10px rgba(0,0,0,.95)) drop-shadow(0 0 16px var(--cglow,transparent));animation:emFloat 4s ease-in-out infinite;}
@keyframes emFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.04)}}
.cf-port-ov{position:absolute;bottom:0;left:0;right:0;height:33%;background:linear-gradient(0deg,rgba(0,0,0,.72),transparent);pointer-events:none;}
.cf-type{position:absolute;top:calc(19px + 40% + 3px);left:5px;right:5px;z-index:7;background:rgba(0,0,0,.72);border-top:1px solid rgba(255,255,255,.1);border-bottom:1px solid rgba(255,255,255,.05);padding:1.5px 4px;display:flex;justify-content:space-between;align-items:center;}
.cf-type-v{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(4px,.88vw,6px);color:rgba(255,255,255,.48);}
.cf-type-el{font-size:clamp(3.5px,.78vw,5.5px);letter-spacing:1.8px;text-transform:uppercase;font-weight:700;color:var(--caccent,rgba(255,255,255,.35));}
.cf-box{position:absolute;top:calc(19px + 40% + 3px + 11px);left:5px;right:5px;bottom:5px;z-index:7;background:rgba(0,0,0,.56);border:1px solid rgba(255,255,255,.07);border-radius:3px;padding:2px 3px;display:flex;flex-direction:column;gap:2px;justify-content:space-between;}
.cf-stats{display:flex;gap:2px;}
.cfst{flex:1;border-radius:3px;display:flex;flex-direction:column;align-items:center;padding:1.5px 2px;}
.cfst.a{background:rgba(150,35,35,.28);border:1px solid rgba(210,65,65,.5);}.cfst.d{background:rgba(35,70,155,.28);border:1px solid rgba(65,110,210,.5);}
.cfst-l{font-size:3.5px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);line-height:1;}
.cfst-v{font-size:clamp(8px,2vw,11px);font-weight:800;line-height:1.1;}
.cfst.a .cfst-v{color:#f4a0a0;text-shadow:0 0 7px rgba(240,80,80,.45);}.cfst.d .cfst-v{color:#90c0f4;text-shadow:0 0 7px rgba(80,150,240,.45);}
.cf-ewrap{display:flex;flex-direction:column;gap:1px;}
.cf-elbl{display:flex;justify-content:space-between;font-size:3.5px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.25);}
.cf-epts{color:var(--caccent,rgba(255,255,255,.4));font-size:4px;font-weight:700;}
.cf-ebar{height:4px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;position:relative;}
.cf-efill{height:100%;border-radius:99px;transition:width .85s cubic-bezier(.55,0,.45,1),background .55s;position:relative;}
.cf-efill::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:rgba(255,255,255,.3);border-radius:99px;}
.cf-beats{display:flex;align-items:center;justify-content:center;gap:2px;}
.cf-blbl{font-size:3.5px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.2);}.cf-bem{font-size:7px;opacity:.6;}
.card-flipper{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);border-radius:9px;}
.hcard.flipped .card-flipper{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:9px;overflow:hidden;}
.card-back-face{transform:rotateY(180deg);}
.card-back-face .cf-frame{background:radial-gradient(ellipse 70% 60% at 50% 40%,#1a0a2a,#07090e),repeating-conic-gradient(from 0deg at 50% 50%,rgba(200,168,74,.04) 0deg 5deg,transparent 5deg 10deg);border-color:rgba(200,168,74,.28);}
.cbk-pat{position:absolute;inset:7px;border-radius:5px;border:1px solid rgba(200,168,74,.18);background:radial-gradient(ellipse at 50%,rgba(200,168,74,.07),transparent 70%),repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(200,168,74,.03) 6px,rgba(200,168,74,.03) 7px);display:flex;align-items:center;justify-content:center;}
.cbk-rune{font-family:'Cinzel Decorative',serif;font-size:clamp(13px,3.5dvh,20px);color:rgba(200,168,74,.28);}
#drag-ghost{position:fixed;z-index:300;pointer-events:none;opacity:.9;display:none;}
#ppr-overlay{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center;background:rgba(6,7,12,.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
#ppr-overlay.show{display:flex;}
#ppr-panel{width:100%;max-width:430px;background:linear-gradient(180deg,rgba(14,16,26,.97),rgba(8,10,18,.99));border-top:1px solid rgba(200,168,74,.18);border-radius:22px 22px 0 0;padding:clamp(14px,3dvh,22px) 18px clamp(12px,2.5dvh,18px);display:flex;flex-direction:column;align-items:center;gap:clamp(10px,2.2dvh,16px);animation:slideUp .35s cubic-bezier(.34,1.2,.64,1);position:relative;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:none;opacity:1;}}
#ppr-card-mini{width:clamp(88px,21vw,112px);aspect-ratio:63/88;position:relative;flex:0 0 auto;animation:pprCardIn .45s cubic-bezier(.34,1.3,.64,1);}
@keyframes pprCardIn{from{transform:rotateY(-80deg) scale(.75);opacity:0;}to{transform:none;opacity:1;}}
#ppr-card-frame{position:absolute;inset:0;border-radius:10px;overflow:hidden;}
#ppr-who{font-size:clamp(8px,1.8dvh,11px);letter-spacing:3px;text-transform:uppercase;color:#c8a84a;opacity:.8;text-align:center;}
#ppr-sub{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(9px,1.9dvh,12px);color:rgba(232,220,200,.32);text-align:center;line-height:1.4;}
#ppr-opts{display:flex;gap:clamp(7px,2vw,12px);justify-content:center;}
.ppr-btn{width:clamp(72px,20vw,92px);border-radius:13px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:clamp(9px,2dvh,13px) 5px;cursor:pointer;position:relative;overflow:hidden;touch-action:manipulation;box-shadow:0 4px 12px rgba(0,0,0,.65);transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s,border-color .18s,background .18s;}
.ppr-btn::after{content:'';position:absolute;top:0;left:0;right:0;height:44%;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent);pointer-events:none;}
.ppr-btn:active{transform:scale(.87) translateY(4px)!important;}
.ppr-btn.chosen{border-color:rgba(200,168,74,.82)!important;box-shadow:0 5px 0 rgba(0,0,0,.4),0 0 0 2px rgba(200,168,74,.44),0 0 26px rgba(200,168,74,.2)!important;transform:translateY(-10px) scale(1.1)!important;background:rgba(200,168,74,.08)!important;}
.ppr-em{font-size:clamp(24px,6dvh,34px);line-height:1;filter:drop-shadow(0 2px 7px rgba(0,0,0,.7));}
.ppr-nm{font-family:'Cinzel',serif;font-size:clamp(7px,1.5vw,9.5px);font-weight:700;color:rgba(255,255,255,.62);}
.ppr-rule{font-size:clamp(5px,.95vw,6.5px);color:rgba(255,255,255,.2);}
#ppr-go{font-family:'Cinzel',serif;font-size:clamp(10px,2.2dvh,14px);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:9px;padding:clamp(9px,1.9dvh,12px) clamp(24px,7vw,38px);cursor:pointer;position:relative;overflow:hidden;background:linear-gradient(160deg,#a08012,#5c4800);color:#f4e090;text-shadow:0 1px 3px rgba(0,0,0,.7);box-shadow:0 4px 0 rgba(0,0,0,.5),0 6px 16px rgba(0,0,0,.4);transition:transform .1s,box-shadow .1s,opacity .2s;}
#ppr-go::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.16),transparent 55%);pointer-events:none;}
#ppr-go:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.5);}
#ppr-go:disabled{opacity:.18;cursor:default;}
.dmg-float{position:fixed;z-index:500;pointer-events:none;font-family:'Cinzel Decorative',serif;font-weight:700;text-align:center;line-height:1;white-space:nowrap;animation:dmgRise var(--dur,1.9s) cubic-bezier(.18,0,.38,1) forwards;}
@keyframes dmgRise{0%{opacity:0;transform:translateY(0) scale(.3);}10%{opacity:1;transform:translateY(-8px) scale(1.35);}30%{transform:translateY(-30px) scale(1);}68%{opacity:1;transform:translateY(-64px) scale(1);}100%{opacity:0;transform:translateY(-98px) scale(.75);}}
.dmg-float.zero{font-size:13px;color:rgba(255,255,255,.26);--dur:1.1s;}
#tap-hint{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+14px);left:50%;transform:translateX(-50%);z-index:22;font-size:7.5px;letter-spacing:2px;text-transform:uppercase;color:rgba(200,168,74,.45);font-family:'IM Fell English',serif;font-style:italic;opacity:0;pointer-events:none;transition:opacity .4s;white-space:nowrap;}
#tap-hint.on{opacity:1;pointer-events:auto;}
#gameover{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);align-items:center;justify-content:center;}
#gameover.show{display:flex;}
#go-box{background:linear-gradient(160deg,#16100a,#0a0806);border:2px solid rgba(200,168,74,.4);border-radius:20px;padding:clamp(26px,5.5dvh,42px) clamp(20px,7vw,38px);text-align:center;max-width:300px;width:88%;box-shadow:0 0 0 1px rgba(200,168,74,.15),0 24px 60px rgba(0,0,0,.95);position:relative;overflow:hidden;}
#go-box::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,74,.6),transparent);}
#go-trophy{font-size:clamp(42px,10dvh,58px);margin-bottom:6px;filter:drop-shadow(0 0 20px rgba(200,168,74,.4));}
#go-title{font-family:'Cinzel Decorative',serif;font-size:clamp(17px,4dvh,25px);color:#c8a84a;text-shadow:0 2px 0 #6a4a00;margin-bottom:6px;}
#go-sub{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(11px,2.5vw,14px);color:rgba(232,220,200,.38);margin-bottom:22px;line-height:1.6;}
#go-restart{font-family:'Cinzel',serif;font-size:clamp(11px,2.4vw,14px);font-weight:700;letter-spacing:1px;background:linear-gradient(160deg,#c8a840,#7a6018);color:#1a1000;border:none;border-radius:9px;padding:10px 26px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.4);position:relative;overflow:hidden;transition:transform .1s,box-shadow .1s;}
#go-restart::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.24),transparent 50%);pointer-events:none;}
#go-restart:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.4);}
</style>
</head>
<body>
<div id="bg"></div><div id="bg-el"></div>
<div id="hud">
  <div class="pb"><div class="pname c1">Jogador 1</div><div class="pbar"><div class="pbfill c1" id="pb1" style="width:100%"></div></div><div class="pcards" id="pc1" style="color:#7ecfff"></div></div>
  <div id="hud-mid"><div id="rd-lbl">Rodada</div><div id="rd-n">1</div><div id="rd-res"></div></div>
  <div class="pb r"><div class="pname c2">Jogador 2</div><div class="pbar"><div class="pbfill c2" id="pb2" style="width:100%"></div></div><div class="pcards" id="pc2" style="color:#ff8080"></div></div>
</div>
<div id="game">
  <div id="arena-zone">
    <div id="phase-bar"></div>
    <div id="arena">
      <div class="dz" id="dz1"><div class="dz-lbl" style="color:#7ecfff">J1</div><div class="dz-icon">✦</div><div class="dz-hint">Arraste aqui</div></div>
      <div id="arena-vs"><span>VS</span></div>
      <div class="dz" id="dz2"><div class="dz-lbl" style="color:#ff8080">J2</div><div class="dz-icon">✦</div><div class="dz-hint">Arraste aqui</div></div>
      <div id="arena-flash"></div>
    </div>
    <button id="rev-btn" onclick="doReveal()">⚡ Revelar</button>
  </div>
  <div id="hand-zone"><div class="hand-rows"><div class="hand-row top" id="row-top"></div><div class="hand-row bot" id="row-bot"></div></div></div>
</div>
<div id="drag-ghost"></div>
<div id="tap-hint">toque para continuar</div>
<div id="ppr-overlay" onclick="overlayTap(event)">
  <div id="ppr-panel">
    <div id="ppr-card-mini"><div id="ppr-card-frame"></div></div>
    <div id="ppr-who"></div>
    <div id="ppr-sub">Pedra esmaga Tesoura · Papel cobre Pedra · Tesoura corta Papel</div>
    <div id="ppr-opts">
      <div class="ppr-btn" data-id="rock" onclick="pickPPR(this)"><div class="ppr-em">🪨</div><div class="ppr-nm">Pedra</div><div class="ppr-rule">vence tesoura</div></div>
      <div class="ppr-btn" data-id="paper" onclick="pickPPR(this)"><div class="ppr-em">📜</div><div class="ppr-nm">Papel</div><div class="ppr-rule">vence pedra</div></div>
      <div class="ppr-btn" data-id="scissors" onclick="pickPPR(this)"><div class="ppr-em">✂️</div><div class="ppr-nm">Tesoura</div><div class="ppr-rule">vence papel</div></div>
    </div>
    <button id="ppr-go" disabled onclick="confirmPPR()">Confirmar golpe</button>
  </div>
</div>
<div id="gameover"><div id="go-box"><div id="go-trophy"></div><div id="go-title"></div><div id="go-sub"></div><button id="go-restart" onclick="init()">↺ Jogar novamente</button></div></div>
<script>
'use strict';
const TH={
  fire:     {name:'Fogo',    emoji:'🔥',vitral:'radial-gradient(ellipse 80% 65% at 50% 35%,#ff9050,#c43800 42%,#7a1000 72%,#1c0200)',portrait:'radial-gradient(ellipse at 50% 60%,#ff6020,#8b1a00 55%,#2a0500)',cray1:'rgba(255,140,40,.3)',border:'rgba(255,130,50,.72)',accent:'#ff8040',glow:'rgba(220,70,0,.6)',particle:'#ff6020',beats:['air','earth']},
  water:    {name:'Água',   emoji:'💧',vitral:'radial-gradient(ellipse 80% 65% at 50% 35%,#70d8ff,#0088c8 42%,#003888 72%,#000e2c)',portrait:'radial-gradient(ellipse at 50% 60%,#0090d0,#003890 55%,#000c28)',cray1:'rgba(60,160,255,.3)',border:'rgba(70,170,255,.7)',accent:'#50b8f0',glow:'rgba(0,120,205,.6)',particle:'#40a0ff',beats:['fire','earth']},
  earth:    {name:'Terra',  emoji:'🌍',vitral:'radial-gradient(ellipse 80% 65% at 50% 35%,#88e088,#2e9030 42%,#0e3a12 72%,#040e04)',portrait:'radial-gradient(ellipse at 50% 60%,#3a9a38,#0e3a10 55%,#040804)',cray1:'rgba(80,190,80,.3)',border:'rgba(70,180,70,.7)',accent:'#50b850',glow:'rgba(45,140,45,.6)',particle:'#60c060',beats:['lightning','water']},
  air:      {name:'Ar',     emoji:'🌪️',vitral:'radial-gradient(ellipse 80% 65% at 50% 35%,#dceeff,#6898c8 42%,#2c3e58 72%,#0c1622)',portrait:'radial-gradient(ellipse at 50% 60%,#6898c8,#2c3e58 55%,#0c1222)',cray1:'rgba(160,200,240,.3)',border:'rgba(150,190,235,.6)',accent:'#90b8d8',glow:'rgba(110,155,200,.48)',particle:'#b0d0f0',beats:['fire','lightning']},
  lightning:{name:'Elétrico',emoji:'⚡',vitral:'radial-gradient(ellipse 80% 65% at 50% 35%,#ffe870,#d09800 42%,#7e5a00 72%,#221600)',portrait:'radial-gradient(ellipse at 50% 60%,#d09800,#7e5a00 55%,#221400)',cray1:'rgba(255,210,50,.35)',border:'rgba(240,200,50,.74)',accent:'#e8b820',glow:'rgba(200,148,0,.65)',particle:'#ffe040',beats:['water','air']},
};
const BASE={fire:{atk:8,def:7},water:{atk:5,def:10},earth:{atk:4,def:11},air:{atk:9,def:6},lightning:{atk:12,def:3}};
const VRNTS=[{s:'Sentinela',da:-2,dd:+2},{s:'Guerreiro',da:0,dd:0},{s:'Assaltante',da:+2,dd:-2}];
const MAX_EN=15;
const PPR={rock:'scissors',paper:'rock',scissors:'paper'};
const PPR_EM={rock:'🪨',paper:'📜',scissors:'✂️'};
const $=id=>document.getElementById(id);
const eCol=p=>p>.6?'linear-gradient(90deg,#1a8a2a,#52c46a)':p>.35?'linear-gradient(90deg,#8a6a00,#f4c030)':'linear-gradient(90deg,#8a1a00,#f45050)';
const clp=v=>Math.max(0,Math.min(1,v));
let p1Deck,p2Deck,p1Pick,p2Pick,p1PPR,p2PPR;
let phase,curPlayer,pprCb,roundNum;
let prevW1=null,prevW2=null;
let dragging=null,dragCard=null,ghostW=0,ghostH=0;
let sparks=[],spkTmr=null,nextTimer=null;
let activePPR=null;

function makeDeck(){return Object.keys(TH).map(eid=>{const v=VRNTS[Math.floor(Math.random()*VRNTS.length)];const b=BASE[eid];return{id:eid+'_'+Math.random().toString(36).slice(2,6),eid,suffix:v.s,atk:Math.max(1,b.atk+v.da),def:Math.max(1,b.def+v.dd),energy:MAX_EN,beats:TH[eid].beats};});}
function startSparks(eid){stopSparks();if(!eid)return;const col=TH[eid].particle;spkTmr=setInterval(()=>{const p=document.createElement('div');p.className='spark';const sz=2+Math.random()*6,dx=(Math.random()-.5)*100;p.style.cssText=`width:${sz}px;height:${sz}px;background:${col};left:${8+Math.random()*84}%;--sx:${dx}px;animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*.4}s;box-shadow:0 0 ${sz*2}px ${col};`;document.body.appendChild(p);sparks.push(p);setTimeout(()=>{p.remove();sparks=sparks.filter(x=>x!==p);},8000);},480);}
function stopSparks(){clearInterval(spkTmr);sparks.forEach(p=>p.remove());sparks=[];}
function setGlow(eid){$('bg-el').style.background=eid?`radial-gradient(ellipse at 50% 100%,${TH[eid].glow.replace(/[\d.]+\)$/,'.09)')},transparent 65%)`:''}
function updHUD(){$('rd-n').textContent=roundNum;const max=5*MAX_EN;const e1=p1Deck.reduce((s,c)=>s+c.energy,0);const e2=p2Deck.reduce((s,c)=>s+c.energy,0);$('pb1').style.width=(e1/max*100).toFixed(1)+'%';$('pb2').style.width=(e2/max*100).toFixed(1)+'%';const a1=p1Deck.filter(c=>c.energy>0).length,a2=p2Deck.filter(c=>c.energy>0).length;$('pc1').textContent=a1+' carta'+(a1!==1?'s':'');$('pc2').textContent=a2+' carta'+(a2!==1?'s':'');}
function setPhase(p){phase=p;const msgs={'p1-pick':'J1 — arraste sua carta','p2-pick':'J2 — arraste sua carta','p1-ppr':'J1 — escolha seu golpe','p2-ppr':'J2 — escolha seu golpe','reveal':'⚔ Revelar','result':''};const pb=$('phase-bar');pb.textContent=msgs[p]||'';pb.style.color=p.startsWith('p2')?'#ff8080':'#7ecfff';}
function resetArena(){dzEmpty('dz1','p1');dzEmpty('dz2','p2');$('rd-res').textContent='';$('rev-btn').classList.remove('ready');}
function dzEmpty(id,player){const col=player==='p1'?'#7ecfff':'#ff8080';const lbl=player==='p1'?'J1':'J2';const s=$(id);s.className='dz';s.style.cssText='';s.innerHTML=`<div class="dz-lbl" style="color:${col}">${lbl}</div><div class="dz-icon">✦</div><div class="dz-hint">Arraste aqui</div>`;}
function dzPlaced(id,player){const col=player==='p1'?'#7ecfff':'#ff8080';const lbl=player==='p1'?'J1':'J2';const s=$(id);s.className='dz filled';s.style.borderColor=col+'44';s.innerHTML=`<div class="dz-lbl" style="color:${col}">${lbl}</div><div style="font-size:24px;opacity:.2">🂠</div><div style="font-size:7px;letter-spacing:1.5px;color:${col};font-weight:700;margin-top:3px">✔ Pronto</div>`;}
function dzReveal(id,card,outcome){const th=TH[card.eid];const s=$(id);s.className='dz filled';s.style.cssText='';s.innerHTML='';const ac=document.createElement('div');ac.className='arena-card '+outcome;ac.style.borderColor=outcome==='winner'?'rgba(200,168,74,.8)':th.border+'77';const pct=clp(card.energy/MAX_EN);const badge=outcome==='winner'?'<div class="ac-badge ab-win">⚔ Vitória</div>':outcome==='loser'?'<div class="ac-badge ab-lose">✕ Derrota</div>':'<div class="ac-badge ab-draw">— Empate</div>';ac.innerHTML=`${badge}<div class="ac-art"><div class="ac-art-bg" style="background:${th.portrait}"></div><div class="ac-art-sh"></div><div class="ac-art-em" style="filter:drop-shadow(0 2px 10px rgba(0,0,0,.9)) drop-shadow(0 0 14px ${th.glow})">${th.emoji}</div><div class="ac-art-nm" style="color:${th.accent}">${th.name}</div></div><div class="ac-foot"><div class="ac-stats"><div class="acst a"><div class="acst-l">ATK</div><div class="acst-v">${card.atk}</div></div><div class="acst d"><div class="acst-l">DEF</div><div class="acst-v">${card.def}</div></div></div><div class="ac-ebar"><div class="ac-efill" style="width:${(pct*100).toFixed(1)}%;background:${eCol(pct)}"></div></div></div>`;s.appendChild(ac);}

function renderHand(deck,player){const alive=deck.filter(c=>c.energy>0);const top=alive.slice(0,2),bot=alive.slice(2);$('row-top').innerHTML='';$('row-bot').innerHTML='';$('row-top').style.display=top.length?'flex':'none';$('row-bot').style.display=bot.length?'flex':'none';alive.forEach(card=>{const th=TH[card.eid];const pct=clp(card.energy/MAX_EN);const isPW=(player==='p1'&&card.id===prevW1)||(player==='p2'&&card.id===prevW2);const bh=card.beats.map(b=>`<span class="cf-bem">${TH[b].emoji}</span>`).join('');const wrap=document.createElement('div');wrap.className='hcard'+(isPW?' prev-winner':'');wrap.style.setProperty('--cborder',th.border);wrap.style.setProperty('--cglow',th.glow);wrap.style.setProperty('--cvitral',th.vitral);wrap.style.setProperty('--cportrait',th.portrait||th.vitral);wrap.style.setProperty('--cray1',th.cray1||'transparent');wrap.style.setProperty('--caccent',th.accent);wrap.dataset.cid=card.id;wrap.innerHTML=`<div class="card-flipper"><div class="card-face"><div class="cf-frame"><div class="cf-vitral"></div><div class="cf-shine"></div><div class="cf-hdr"><div class="cf-hname">${th.name}</div><div class="cf-hem">${th.emoji}</div></div><div class="cf-portrait"><div class="cf-port-bg"></div><div class="cf-port-rays"></div><div class="cf-port-em">${th.emoji}</div><div class="cf-port-ov"></div></div><div class="cf-type"><div class="cf-type-v">${card.suffix}</div><div class="cf-type-el">${th.name}</div></div><div class="cf-box"><div class="cf-stats"><div class="cfst a"><div class="cfst-l">ATK</div><div class="cfst-v">${card.atk}</div></div><div class="cfst d"><div class="cfst-l">DEF</div><div class="cfst-v">${card.def}</div></div></div><div class="cf-ewrap"><div class="cf-elbl"><span>Energia</span><span class="cf-epts">${card.energy}/${MAX_EN}</span></div><div class="cf-ebar"><div class="cf-efill" style="width:${(pct*100).toFixed(1)}%;background:${eCol(pct)}"></div></div></div><div class="cf-beats"><span class="cf-blbl">▸&nbsp;</span>${bh}</div></div></div></div><div class="card-face card-back-face"><div class="cf-frame"><div class="cbk-pat"><div class="cbk-rune">✦</div></div></div></div></div>`;setupDrag(wrap,card);(top.includes(card)?$('row-top'):$('row-bot')).appendChild(wrap);});}

function setupDrag(el,card){el.addEventListener('touchstart',e=>{e.preventDefault();startDrag(el,card,e.touches[0].clientX,e.touches[0].clientY);},{passive:false});el.addEventListener('touchmove',e=>{e.preventDefault();if(dragging)moveDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});el.addEventListener('touchend',e=>{if(dragging)endDrag(e.changedTouches[0].clientX,e.changedTouches[0].clientY);});el.addEventListener('mousedown',e=>{e.preventDefault();startDrag(el,card,e.clientX,e.clientY);});}
document.addEventListener('mousemove',e=>{if(dragging)moveDrag(e.clientX,e.clientY);});
document.addEventListener('mouseup',e=>{if(dragging)endDrag(e.clientX,e.clientY);});
function startDrag(el,card,cx,cy){if(phase!=='p1-pick'&&phase!=='p2-pick')return;const deck=curPlayer==='p1'?p1Deck:p2Deck;if(!deck.find(c=>c.id===card.id))return;dragging=el;dragCard=card;el.classList.add('dragging');const ghost=$('drag-ghost');ghost.innerHTML=el.outerHTML;const rect=el.getBoundingClientRect();ghostW=rect.width;ghostH=rect.height;ghost.style.width=ghostW+'px';ghost.style.height=ghostH+'px';ghost.style.borderRadius='9px';ghost.style.display='block';moveDrag(cx,cy);startSparks(card.eid);setGlow(card.eid);if(navigator.vibrate)navigator.vibrate(18);}
function moveDrag(cx,cy){const ghost=$('drag-ghost');if(!ghost)return;ghost.style.left=(cx-ghostW/2)+'px';ghost.style.top=(cy-ghostH/2)+'px';const dzId=curPlayer==='p1'?'dz1':'dz2';const r=$(dzId).getBoundingClientRect();const over=cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom;$(dzId).style.borderColor=over?'rgba(200,168,74,.8)':'';$(dzId).style.background=over?'rgba(200,168,74,.05)':'';ghost.style.transform=over?'scale(1.07) rotate(2deg)':'scale(1) rotate(0)';ghost.style.transition='transform .16s';}
function endDrag(cx,cy){const ghost=$('drag-ghost');if(!ghost||!dragging||!dragCard)return;ghost.style.display='none';dragging.classList.remove('dragging');const dzId=curPlayer==='p1'?'dz1':'dz2';const dz=$(dzId);const r=dz.getBoundingClientRect();const dropped=cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom;dz.classList.remove('lit');dz.style.borderColor='';dz.style.background='';if(dropped)onDropped(dragCard);dragging=null;dragCard=null;}

function onDropped(card){if(navigator.vibrate)navigator.vibrate([15,10,25]);stopSparks();setGlow(null);if(curPlayer==='p1'){p1Pick=card;dzPlaced('dz1','p1');showPPR('p1',card,()=>{curPlayer='p2';setPhase('p2-pick');$('dz2').classList.add('lit');renderHand(p2Deck,'p2');});}else{p2Pick=card;dzPlaced('dz2','p2');showPPR('p2',card,()=>{setPhase('reveal');$('rev-btn').classList.add('ready');renderHand([],'p2');});}}

function showPPR(player,card,cb){pprCb=cb;activePPR=null;const th=TH[card.eid];const p1=player==='p1';const pct=clp(card.energy/MAX_EN);$('ppr-card-frame').style.cssText=`position:absolute;inset:0;border-radius:10px;overflow:hidden;border:2.5px solid ${th.border};box-shadow:0 8px 28px rgba(0,0,0,.85),0 0 0 1px ${th.border}44,0 0 40px ${th.glow.replace(/[\d.]+\)$/,'.2)')};`;$('ppr-card-frame').innerHTML=`<div style="position:absolute;inset:0;background:${th.vitral};"></div><div style="position:absolute;top:0;left:0;right:0;height:34%;background:linear-gradient(180deg,rgba(255,255,255,.22),transparent);pointer-events:none;z-index:4;border-radius:8px 8px 0 0;"></div><div style="position:absolute;inset:3px;border-radius:7px;border:1px solid rgba(255,255,255,.1);z-index:2;pointer-events:none;"></div><div style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:7px 6px;z-index:8;"><div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-family:'Cinzel',serif;font-size:7px;font-weight:700;color:#fff;text-shadow:0 0 8px rgba(0,0,0,1)">${th.name}</span><span style="font-size:10px">${th.emoji}</span></div><div style="text-align:center;font-size:38px;filter:drop-shadow(0 3px 14px rgba(0,0,0,.95)) drop-shadow(0 0 22px ${th.glow})">${th.emoji}</div><div><div style="display:flex;gap:4px;margin-bottom:4px;"><div style="flex:1;background:rgba(150,35,35,.28);border:1px solid rgba(210,65,65,.55);border-radius:4px;padding:2px;display:flex;flex-direction:column;align-items:center;"><span style="font-size:5px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);">ATK</span><span style="font-size:18px;font-weight:800;color:#f4a0a0;line-height:1">${card.atk}</span></div><div style="flex:1;background:rgba(35,70,155,.28);border:1px solid rgba(65,110,210,.55);border-radius:4px;padding:2px;display:flex;flex-direction:column;align-items:center;"><span style="font-size:5px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);">DEF</span><span style="font-size:18px;font-weight:800;color:#90c0f4;line-height:1">${card.def}</span></div></div><div style="height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;"><div style="height:100%;width:${(pct*100).toFixed(1)}%;background:${eCol(pct)};border-radius:99px;"></div></div></div></div>`;$('ppr-who').style.color=p1?'#7ecfff':'#ff8080';$('ppr-who').textContent=(p1?'Jogador 1':'Jogador 2')+' — golpe secreto';document.querySelectorAll('.ppr-btn').forEach(b=>b.classList.remove('chosen'));$('ppr-go').disabled=true;const mini=$('ppr-card-mini');mini.style.animation='none';void mini.offsetHeight;mini.style.animation='pprCardIn .45s cubic-bezier(.34,1.3,.64,1)';setPhase(player+'-ppr');$('ppr-overlay').classList.add('show');startSparks(card.eid);setGlow(card.eid);}
function overlayTap(e){if(e.target===e.currentTarget&&activePPR)confirmPPR();}
function pickPPR(el){document.querySelectorAll('.ppr-btn').forEach(b=>b.classList.remove('chosen'));el.classList.add('chosen');activePPR=el.dataset.id;$('ppr-go').disabled=false;if(navigator.vibrate)navigator.vibrate(12);}
function confirmPPR(){if(!activePPR)return;if(curPlayer==='p1')p1PPR=activePPR;else p2PPR=activePPR;$('ppr-overlay').classList.remove('show');stopSparks();setGlow(null);if(pprCb)pprCb();}

function doReveal(){
  $('rev-btn').classList.remove('ready');
  const c1=p1Pick,c2=p2Pick;
  if(!c1||!c2||!p1PPR||!p2PPR)return;
  /* PPR — empate é desempatado por sorteio: sempre há um atacante */
  let p1wP=PPR[p1PPR]===p2PPR, p2wP=PPR[p2PPR]===p1PPR;
  if(!p1wP&&!p2wP){ if(Math.random()<.5)p1wP=true; else p2wP=true; }
  const elB1=c1.beats.includes(c2.eid)?2:0,elB2=c2.beats.includes(c1.eid)?2:0;
  let dmg2=0,dmg1=0;
  if(p1wP)dmg2=Math.max(1,(c1.atk+elB1)-c2.def);
  if(p2wP)dmg1=Math.max(1,(c2.atk+elB2)-c1.def);
  const oldE1=c1.energy,oldE2=c2.energy;
  const newE1=Math.max(0,oldE1-dmg1),newE2=Math.max(0,oldE2-dmg2);
  let out1,out2;
  if(dmg2>dmg1){out1='winner';out2='loser';prevW1=c1.id;prevW2=null;}
  else if(dmg1>dmg2){out1='loser';out2='winner';prevW1=null;prevW2=c2.id;}
  else{out1='draw';out2='draw';prevW1=null;prevW2=null;}
  dzReveal('dz1',c1,out1);dzReveal('dz2',c2,out2);
  $('phase-bar').textContent=`${PPR_EM[p1PPR]} vs ${PPR_EM[p2PPR]} — ${p1wP?'J1 ataca':p2wP?'J2 ataca':'Troca mútua'}`;
  $('phase-bar').style.color='rgba(200,168,74,.6)';
  setTimeout(()=>{
    const wDz=out1==='winner'?'dz1':out2==='winner'?'dz2':null;
    const lDz=out1==='loser'?'dz1':out2==='loser'?'dz2':null;
    if(wDz&&lDz){const wC=$(wDz).querySelector('.arena-card');const lC=$(lDz).querySelector('.arena-card');if(wC&&lC){const wr=wC.getBoundingClientRect(),lr=lC.getBoundingClientRect();const dx=lr.left-wr.left;wC.style.setProperty('--sdx',(dx>0?Math.min(dx*.5,46):-Math.min(Math.abs(dx)*.5,46))+'px');wC.style.setProperty('--sdr',(dx>0?4:-4)+'deg');wC.classList.add('smashing');}}
    else{['dz1','dz2'].forEach(id=>{const c=$(id).querySelector('.arena-card');if(c)c.classList.add('hit-shake');});}
  },380);
  setTimeout(()=>{
    if(out1!=='draw'){const lDz=out1==='loser'?'dz1':'dz2';const lC=$(lDz).querySelector('.arena-card');if(lC)lC.classList.add('hit-shake');}
    const f=$('arena-flash');f.style.animation='none';void f.offsetHeight;f.style.animation='arenaImpact .3s ease forwards';
    if(navigator.vibrate)navigator.vibrate([26,8,14]);
  },650);
  setTimeout(()=>{[[dmg1,'dz1',c1,out1],[dmg2,'dz2',c2,out2]].forEach(([dmg,dzId,card,outcome])=>{const r=$(dzId).getBoundingClientRect();spawnDmg(dmg,r.left+r.width/2,r.top+r.height*.3,TH[card.eid].accent,outcome==='loser');});},900);
  setTimeout(()=>{drainAC('dz1',newE1);drainAC('dz2',newE2);c1.energy=newE1;c2.energy=newE2;drainHC(c1.id,newE1);drainHC(c2.id,newE2);},1150);
  setTimeout(()=>{const lbl=out1==='winner'?'⚔ J1 venceu':out2==='winner'?'⚔ J2 venceu':'— Empate';$('rd-res').textContent=lbl;updHUD();},2000);
  setTimeout(()=>{[[c1,'dz1',out1],[c2,'dz2',out2]].forEach(([card,dzId,outcome])=>{if(card.energy<=0){const ac=$(dzId).querySelector('.arena-card');if(ac)ac.style.animation='acDie .6s cubic-bezier(.4,0,1,1) forwards';setTimeout(()=>{const hc=document.querySelector(`[data-cid="${card.id}"]`);if(hc){hc.classList.add('dying');setTimeout(()=>hc.remove(),620);}},260);}else{retToHand(dzId,card.id,outcome==='winner');}});},2700);
  setTimeout(()=>{
    const a1=p1Deck.filter(c=>c.energy>0).length,a2=p2Deck.filter(c=>c.energy>0).length;
    if(a1===0||a2===0){endGame();return;}
    $('tap-hint').classList.add('on');
    const go=()=>{$('tap-hint').classList.remove('on');clearTimeout(nextTimer);advanceRound();};
    document.addEventListener('touchstart',go,{once:true,passive:true});
    document.addEventListener('mousedown',go,{once:true});
    nextTimer=setTimeout(go,3500);
  },3400);
}

function advanceRound(){roundNum++;p1Pick=p2Pick=p1PPR=p2PPR=null;updHUD();resetArena();curPlayer='p1';renderHand(p1Deck,'p1');$('dz1').classList.add('lit');setPhase('p1-pick');}

function spawnDmg(dmg,cx,cy,color,isLose){const el=document.createElement('div');if(dmg===0){el.className='dmg-float zero';el.textContent='0';}else{const fs=Math.round(12+(dmg/MAX_EN)*46);el.className='dmg-float';const col=isLose?'#f45050':color;el.style.cssText=`font-size:${fs}px;color:${col};text-shadow:0 0 ${fs}px ${col},0 2px 8px rgba(0,0,0,.9);--dur:${1.4+dmg*.05}s;`;el.textContent=(isLose?'-':'')+dmg;}el.style.left=(cx-26)+'px';el.style.top=cy+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),2500);}
function drainAC(dzId,toE){const fill=$(dzId).querySelector('.ac-efill');if(!fill)return;const pct=clp(toE/MAX_EN);requestAnimationFrame(()=>requestAnimationFrame(()=>{fill.style.transition='width 1.1s cubic-bezier(.55,0,.45,1),background .7s';fill.style.width=(pct*100).toFixed(1)+'%';fill.style.background=eCol(pct);}));}
function drainHC(cardId,newE){const wrap=document.querySelector(`[data-cid="${cardId}"]`);if(!wrap)return;const fill=wrap.querySelector('.cf-efill');const pts=wrap.querySelector('.cf-epts');if(fill){const pct=clp(newE/MAX_EN);requestAnimationFrame(()=>requestAnimationFrame(()=>{fill.style.transition='width .85s cubic-bezier(.55,0,.45,1),background .55s';fill.style.width=(pct*100).toFixed(1)+'%';fill.style.background=eCol(pct);}));}if(pts)pts.textContent=`${Math.max(0,newE)}/${MAX_EN}`;}
function retToHand(dzId,cardId,isWinner){const ac=$(dzId).querySelector('.arena-card');if(!ac)return;const acR=ac.getBoundingClientRect();const clone=document.createElement('div');clone.style.cssText=`position:fixed;z-index:200;pointer-events:none;left:${acR.left}px;top:${acR.top}px;width:${acR.width}px;height:${acR.height}px;border-radius:12px;overflow:hidden;border:1.5px solid rgba(200,168,74,.32);opacity:1;transition:all .58s cubic-bezier(.5,0,1,.8);`;clone.innerHTML=ac.innerHTML;document.body.appendChild(clone);const hc=document.querySelector(`[data-cid="${cardId}"]`);let tx=0,ty=60,rot=isWinner?-10:18;if(hc){const hr=hc.getBoundingClientRect();tx=(hr.left+hr.width/2)-(acR.left+acR.width/2);ty=(hr.top+hr.height/2)-(acR.top+acR.height/2);}requestAnimationFrame(()=>requestAnimationFrame(()=>{clone.style.transform=`translate(${tx}px,${ty}px) scale(.1) rotate(${rot}deg)`;clone.style.opacity='0';setTimeout(()=>clone.remove(),640);}));}
function endGame(){const a1=p1Deck.filter(c=>c.energy>0).length,a2=p2Deck.filter(c=>c.energy>0).length;let trophy='🏆',title='',sub='';if(a1===0&&a2===0){trophy='🤝';title='Empate!';sub='Ambos os decks foram destruídos.';}else if(a2===0){title='Jogador 1 Venceu!';sub='Deck do oponente destruído.';}else{title='Jogador 2 Venceu!';sub='Deck do oponente destruído.';}$('go-trophy').textContent=trophy;$('go-title').textContent=title;$('go-sub').textContent=sub;$('gameover').classList.add('show');stopSparks();}
function init(){clearTimeout(nextTimer);$('tap-hint').classList.remove('on');p1Deck=makeDeck();p2Deck=makeDeck();p1Pick=p2Pick=p1PPR=p2PPR=null;prevW1=prevW2=null;roundNum=1;$('gameover').classList.remove('show');$('ppr-overlay').classList.remove('show');stopSparks();setGlow(null);updHUD();resetArena();curPlayer='p1';renderHand(p1Deck,'p1');$('dz1').classList.add('lit');setPhase('p1-pick');}
init();
</script>
<script src="../version-widget.js"></script>
</body>
