<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clock Widget</title>
  <style>
    body { margin: 0; background: #111; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #e0e0e0; }
    #time { font-size: 4rem; letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <div id="time"></div>
  <script>
    function tick() {
      document.getElementById('time').textContent = new Date().toLocaleTimeString();
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
