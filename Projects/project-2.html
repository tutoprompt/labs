<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Color Palette Generator</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #f5f5f5; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
    .swatches { display: flex; gap: 8px; }
    .swatch { width: 60px; height: 60px; border-radius: 4px; }
    button { padding: 8px 20px; cursor: pointer; border: none; background: #111; color: #fff; font-size: 13px; }
  </style>
</head>
<body>
  <div class="swatches" id="swatches"></div>
  <button onclick="generate()">Generate</button>
  <script>
    function rand() { return '#' + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0'); }
    function generate() {
      const s = document.getElementById('swatches');
      s.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        const d = document.createElement('div');
        d.className = 'swatch';
        d.style.background = rand();
        s.appendChild(d);
      }
    }
    generate();
  </script>
</body>
</html>
