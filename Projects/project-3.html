<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Typing Speed Test</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; padding: 20px; }
    #prompt { font-size: 1.1rem; max-width: 500px; text-align: center; color: #aaa; line-height: 1.6; }
    textarea { width: 500px; max-width: 90vw; padding: 12px; font-size: 1rem; border: 1px solid #444; background: #111; color: #fff; resize: none; }
    #result { font-size: 0.9rem; color: #7ec8e3; }
  </style>
</head>
<body>
  <p id="prompt">The quick brown fox jumps over the lazy dog. Pack my box with five dozen liquor jugs.</p>
  <textarea id="input" rows="3" placeholder="Start typing…" oninput="check()"></textarea>
  <span id="result"></span>
  <script>
    const src = document.getElementById('prompt').textContent;
    let started = null;
    function check() {
      const val = document.getElementById('input').value;
      if (!started && val.length === 1) started = Date.now();
      if (val === src) {
        const wpm = Math.round((src.split(' ').length / ((Date.now() - started) / 60000)));
        document.getElementById('result').textContent = `✓ Done! ${wpm} WPM`;
      }
    }
  </script>
</body>
</html>
