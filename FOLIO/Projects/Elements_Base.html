<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esferas de Energia Natural</title>
    <style>
        :root {
            --bg-color: #020205;
            --sphere-size: 300px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            gap: 60px;
            perspective: 1000px;
        }

        .sphere-wrapper {
            position: relative;
            width: var(--sphere-size);
            height: var(--sphere-size);
            border-radius: 50%;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8);
            transition: transform 0.5s ease;
        }

        .sphere-wrapper:hover {
            transform: scale(1.05);
        }

        /* Subtle outer glow for each sphere type */
        .water-wrapper { box-shadow: 0 0 100px rgba(0, 100, 255, 0.15); border: 1px solid rgba(0, 150, 255, 0.1); }
        .cloud-wrapper { box-shadow: 0 0 100px rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.05); }
        .fire-wrapper { box-shadow: 0 0 100px rgba(255, 50, 0, 0.15); border: 1px solid rgba(255, 100, 0, 0.1); }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Glass effect overlay */
        .glass-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.12) 0%, transparent 60%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 10;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }

        @media (max-width: 1000px) {
            .container {
                flex-direction: column;
                gap: 30px;
                overflow-y: auto;
                padding: 40px 0;
            }
            :root {
                --sphere-size: 240px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sphere-wrapper water-wrapper">
        <canvas id="waterCanvas"></canvas>
        <div class="glass-overlay"></div>
    </div>
    
    <div class="sphere-wrapper cloud-wrapper">
        <canvas id="cloudCanvas"></canvas>
        <div class="glass-overlay"></div>
    </div>
    
    <div class="sphere-wrapper fire-wrapper">
        <canvas id="fireCanvas"></canvas>
        <div class="glass-overlay"></div>
    </div>
</div>

<script>
    const waterCanvas = document.getElementById('waterCanvas');
    const cloudCanvas = document.getElementById('cloudCanvas');
    const fireCanvas = document.getElementById('fireCanvas');

    function resizeCanvas(canvas) {
        const rect = canvas.parentElement.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
    }

    [waterCanvas, cloudCanvas, fireCanvas].forEach(resizeCanvas);
    window.addEventListener('resize', () => {
        [waterCanvas, cloudCanvas, fireCanvas].forEach(resizeCanvas);
    });

    // --- WATER SIMULATION ---
    const waterCtx = waterCanvas.getContext('2d');
    let waterTime = 0;

    function drawWater() {
        const w = waterCanvas.width;
        const h = waterCanvas.height;
        waterCtx.clearRect(0, 0, w, h);
        
        const gradient = waterCtx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w/2);
        gradient.addColorStop(0, '#002233');
        gradient.addColorStop(1, '#00050a');
        waterCtx.fillStyle = gradient;
        waterCtx.fillRect(0, 0, w, h);

        for (let i = 0; i < 5; i++) {
            waterCtx.beginPath();
            const opacity = 0.15 + (i * 0.12);
            waterCtx.fillStyle = `rgba(0, 140, 255, ${opacity})`;
            
            const offset = i * 100;
            const speed = 0.015 + (i * 0.008);
            const amplitude = 12 + (i * 6);
            const frequency = 0.008 + (i * 0.004);

            waterCtx.moveTo(0, h);
            for (let x = 0; x <= w; x += 4) {
                const y = (h * 0.55) + Math.sin(x * frequency + (waterTime * speed) + offset) * amplitude 
                          + Math.cos(x * 0.01 - waterTime * 0.01) * 5;
                waterCtx.lineTo(x, y);
            }
            waterCtx.lineTo(w, h);
            waterCtx.fill();
        }

        for (let i = 0; i < 12; i++) {
            const bx = (Math.sin(waterTime * 0.008 + i * 1.5) * 0.4 + 0.5) * w;
            const by = ((Math.cos(waterTime * 0.012 + i * 2.2) * 0.35 + 0.5) * h);
            const size = Math.abs(Math.sin(waterTime * 0.015 + i)) * 4 + 2;
            
            waterCtx.beginPath();
            waterCtx.arc(bx, by, size, 0, Math.PI * 2);
            waterCtx.fillStyle = 'rgba(200, 240, 255, 0.2)';
            waterCtx.fill();
        }

        waterTime += 1;
        requestAnimationFrame(drawWater);
    }

    // --- CLOUD SIMULATION ---
    const cloudCtx = cloudCanvas.getContext('2d');
    let cloudTime = 0;
    const clouds = [];

    for (let i = 0; i < 30; i++) {
        clouds.push({
            x: Math.random() * 300,
            y: Math.random() * 300,
            r: 40 + Math.random() * 60,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4,
            phase: Math.random() * Math.PI * 2
        });
    }

    function drawCloud() {
        const w = cloudCanvas.width;
        const h = cloudCanvas.height;
        cloudCtx.clearRect(0, 0, w, h);

        const bgGradient = cloudCtx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w/2);
        bgGradient.addColorStop(0, '#1a2a3a');
        bgGradient.addColorStop(1, '#020205');
        cloudCtx.fillStyle = bgGradient;
        cloudCtx.fillRect(0, 0, w, h);

        cloudCtx.filter = 'blur(30px)';
        
        clouds.forEach((c, i) => {
            c.x += c.vx;
            c.y += c.vy;
            
            const dx = c.x - w/2;
            const dy = c.y - h/2;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > w/2 - c.r * 0.5) {
                c.vx *= -1;
                c.vy *= -1;
            }

            const pulse = Math.sin(cloudTime * 0.008 + c.phase) * 15;
            
            cloudCtx.beginPath();
            cloudCtx.arc(c.x, c.y, c.r + pulse, 0, Math.PI * 2);
            const opacity = 0.08 + (Math.sin(cloudTime * 0.004 + i) * 0.04);
            cloudCtx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
            cloudCtx.fill();
        });

        cloudCtx.filter = 'none';
        cloudTime += 1;
        requestAnimationFrame(drawCloud);
    }

    // --- FIRE SIMULATION ---
    const fireCtx = fireCanvas.getContext('2d');
    const fireParticles = [];

    class FireParticle {
        constructor(w, h) {
            this.reset(w, h);
        }
        reset(w, h) {
            this.x = w/2 + (Math.random() - 0.5) * (w * 0.3);
            this.y = h * 0.85 + (Math.random() - 0.5) * 30;
            this.vx = (Math.random() - 0.5) * 1.5;
            this.vy = -Math.random() * 3 - 1.5;
            this.life = 1.0;
            this.decay = 0.008 + Math.random() * 0.015;
            this.size = 15 + Math.random() * 25;
        }
        update(w, h) {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= this.decay;
            this.size *= 0.985;
            if (this.life <= 0) this.reset(w, h);
        }
        draw(ctx) {
            const r = 255;
            const g = Math.floor(160 * this.life);
            const b = Math.floor(40 * this.life * this.life);
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.life * 0.5})`;
            ctx.fill();
        }
    }

    function initFire() {
        for (let i = 0; i < 80; i++) {
            fireParticles.push(new FireParticle(fireCanvas.width, fireCanvas.height));
        }
    }

    function drawFire() {
        const w = fireCanvas.width;
        const h = fireCanvas.height;
        fireCtx.clearRect(0, 0, w, h);

        const bgGradient = fireCtx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w/2);
        bgGradient.addColorStop(0, '#220a00');
        bgGradient.addColorStop(1, '#020205');
        fireCtx.fillStyle = bgGradient;
        fireCtx.fillRect(0, 0, w, h);

        fireCtx.globalCompositeOperation = 'lighter';
        fireCtx.filter = 'blur(12px)';
        
        fireParticles.forEach(p => {
            p.update(w, h);
            p.draw(fireCtx);
        });

        fireCtx.filter = 'none';
        fireCtx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(drawFire);
    }

    // Start all
    initFire();
    drawWater();
    drawCloud();
    drawFire();

</script>
</body>
</html>
