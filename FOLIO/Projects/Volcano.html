<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vulcão Atmosférico - Vista Superior</title>
    <style>
        :root {
            --bg-color: #050201;
            --lava-bright: #ff5e00;
            --lava-hot: #ffcc00;
            --lava-deep: #4d0f00;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .ui-container {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--lava-bright);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -9px;
            box-shadow: 0 0 20px var(--lava-bright);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid white;
        }

        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.3);
            background: var(--lava-hot);
        }

        .label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
        }

        /* Vignette effect */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            z-index: 5;
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="volcanoCanvas"></canvas>
    <div class="vignette"></div>
</div>

<div class="ui-container">
    <input type="range" id="intensitySlider" min="0" max="100" value="30">
    <div class="label">Intensidade Vulcânica</div>
</div>

<script>
    const canvas = document.getElementById('volcanoCanvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('intensitySlider');

    let width, height, centerX, centerY, dpr;
    let intensity = 0.3;
    let time = 0;

    function resize() {
        dpr = window.devicePixelRatio || 1;
        width = canvas.width = window.innerWidth * dpr;
        height = canvas.height = window.innerHeight * dpr;
        centerX = width / 2;
        centerY = height / 2;
        ctx.scale(dpr, dpr);
        // Adjust logical center for scaled context
        centerX /= dpr;
        centerY /= dpr;
    }

    window.addEventListener('resize', resize);
    resize();

    slider.addEventListener('input', (e) => {
        intensity = e.target.value / 100;
    });

    // Particle System
    const particles = [];
    const MAX_PARTICLES = 600;

    class Particle {
        constructor() {
            this.init();
        }

        init() {
            // Start from center with slight offset
            const startRadius = 10 + Math.random() * 20;
            const startAngle = Math.random() * Math.PI * 2;
            this.x = centerX + Math.cos(startAngle) * startRadius;
            this.y = centerY + Math.sin(startAngle) * startRadius;
            
            // 3D-like projection variables
            this.z = 0; // Height from surface
            // Upward velocity depends on intensity
            this.vz = (1 + Math.random() * 4) * (0.3 + intensity * 3); 
            
            const angle = Math.random() * Math.PI * 2;
            // Spread speed
            const speed = (0.5 + Math.random() * 2) * (0.1 + intensity * 1.5);
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            
            this.life = 1.0;
            this.decay = 0.003 + Math.random() * 0.008;
            this.size = 1 + Math.random() * 4;
            
            // Color based on temperature
            this.hue = 15 + Math.random() * 30; // Orange to Yellow
            this.isFalling = false;
        }

        update() {
            // Physics
            this.z += this.vz;
            this.vz -= 0.1; // Gravity

            this.x += this.vx;
            this.y += this.vy;

            // When it hits the ground
            if (this.z < 0) {
                this.z = 0;
                this.vz = 0;
                this.vx *= 0.92; // Friction
                this.vy *= 0.92;
                this.life -= this.decay * 3; // Cool down faster on ground
            } else {
                this.life -= this.decay;
            }

            if (this.life <= 0) {
                this.init();
            }
        }

        draw() {
            // Perspective: size increases as it comes "up" (closer to viewer)
            // Z is height, so higher Z = closer to camera
            const scale = 1 + (this.z * 0.04);
            const drawSize = this.size * scale;
            
            // Opacity and color based on life and height
            const alpha = Math.min(this.life * 1.5, 1);
            const brightness = 50 + (this.z * 0.5);
            
            ctx.beginPath();
            ctx.arc(this.x, this.y, drawSize, 0, Math.PI * 2);
            
            // Hotter when higher/younger
            const g = Math.floor(100 + this.life * 155);
            ctx.fillStyle = `rgba(255, ${g}, 0, ${alpha})`;
            
            // Add glow to very hot particles
            if (this.life > 0.7) {
                ctx.shadowBlur = 10 * intensity * scale;
                ctx.shadowColor = 'rgba(255, 100, 0, 0.8)';
            } else {
                ctx.shadowBlur = 0;
            }
            
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    // Initialize particles
    for (let i = 0; i < MAX_PARTICLES; i++) {
        particles.push(new Particle());
    }

    function drawVolcano() {
        // Clear with slight trail effect for motion blur
        ctx.fillStyle = 'rgba(5, 2, 1, 0.2)';
        ctx.fillRect(0, 0, width / dpr, height / dpr);

        // 1. Heat Aura (Deep Glow)
        const baseRadius = Math.min(width, height) * 0.4 / dpr;
        const pulse = Math.sin(time * 0.03) * 15 * intensity;
        
        const auraGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, baseRadius + pulse);
        auraGrad.addColorStop(0, `rgba(255, 50, 0, ${0.2 + intensity * 0.3})`);
        auraGrad.addColorStop(0.5, `rgba(100, 20, 0, ${0.1 + intensity * 0.2})`);
        auraGrad.addColorStop(1, 'transparent');

        ctx.fillStyle = auraGrad;
        ctx.fillRect(0, 0, width / dpr, height / dpr);

        // 2. Magma Circulation (Beneath the surface)
        ctx.globalCompositeOperation = 'screen';
        for (let i = 0; i < 4; i++) {
            const r = baseRadius * (0.3 + i * 0.15);
            const t = time * (0.005 + i * 0.002);
            const rot = time * 0.002 * (i % 2 === 0 ? 1 : -1);
            
            ctx.beginPath();
            for (let a = 0; a < Math.PI * 2; a += 0.3) {
                const noise = Math.sin(a * 4 + t) * 20 * intensity;
                const x = centerX + Math.cos(a + rot) * (r + noise);
                const y = centerY + Math.sin(a + rot) * (r + noise);
                if (a === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.strokeStyle = `rgba(255, 80, 0, ${0.05 / (i + 1)})`;
            ctx.lineWidth = (30 + intensity * 40) / (i + 1);
            ctx.stroke();
        }
        ctx.globalCompositeOperation = 'source-over';

        // 3. The Central Crater (The Source)
        const craterRadius = 40 + (intensity * 30);
        const craterGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, craterRadius);
        craterGrad.addColorStop(0, '#fff5cc');
        craterGrad.addColorStop(0.2, '#ffcc00');
        craterGrad.addColorStop(0.5, '#ff4d00');
        craterGrad.addColorStop(0.8, '#220500');
        craterGrad.addColorStop(1, 'rgba(0,0,0,0.5)');
        
        ctx.beginPath();
        ctx.arc(centerX, centerY, craterRadius, 0, Math.PI * 2);
        ctx.fillStyle = craterGrad;
        ctx.fill();
        
        // Inner core pulse
        const corePulse = 1 + Math.sin(time * 0.1) * 0.1 * intensity;
        ctx.beginPath();
        ctx.arc(centerX, centerY, craterRadius * 0.4 * corePulse, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.filter = 'blur(10px)';
        ctx.fill();
        ctx.filter = 'none';

        // 4. Eruption Particles
        // Number of active particles depends on intensity
        const activeCount = Math.floor(MAX_PARTICLES * (0.1 + intensity * 0.9));
        
        // Sort particles by Z (height) to draw higher ones last (painter's algorithm)
        const activeParticles = particles.slice(0, activeCount).sort((a, b) => a.z - b.z);
        
        activeParticles.forEach(p => {
            p.update();
            p.draw();
        });

        // 5. Ash/Smoke Layer (Subtle dark particles)
        if (intensity > 0.5) {
            ctx.fillStyle = `rgba(20, 15, 10, ${(intensity - 0.5) * 0.2})`;
            ctx.filter = 'blur(40px)';
            ctx.beginPath();
            ctx.arc(centerX, centerY, baseRadius * 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.filter = 'none';
        }

        time++;
        requestAnimationFrame(drawVolcano);
    }

    drawVolcano();

</script>
</body>
</html>
